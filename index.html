      solo|duo|team|monitor|review) LAYOUT="$1" ;;
      -k|--kill) KILL_EXISTING=1 ;;
      --root) shift; [ "$#" -gt 0 ] || die "--root requires a directory"; ROOT_DIR="$1" ;;
      -h|--help) usage; exit 0 ;;
      --version) echo "$VERSION"; exit 0 ;;
      *) die "unknown argument: $1" ;;
    esac
    shift
  done
}

main() {
  parse_args "$@"
  need tmux
  [ -d "$ROOT_DIR" ] || die "root directory does not exist: $ROOT_DIR"
  ROOT_DIR="$(cd "$ROOT_DIR" && pwd)"
  case "$LAYOUT" in
    solo) layout_solo ;;
    duo) layout_duo ;;
    team) layout_team ;;
    monitor) layout_monitor ;;
    review) layout_review ;;
    *) die "unknown layout: $LAYOUT" ;;
  esac
}

main "$@"

#!/usr/bin/env bash
# ~/.claude/statusline.sh — Claude Code status line
# Single-line, dense layout:
# model · cwd · git-branch[*] · ctx XX% [▓▓░░░] · 5h XX% [▓░░░░] · 7d XX% [░░░░░] · $0.00 · Xs · +12 -3

input=$(cat)

# Force C locale so printf "%.2f" works regardless of user's LC_NUMERIC
export LC_ALL=C

# ── ANSI helpers ──────────────────────────────────────────────────────────────
reset='\033[0m'
bold='\033[1m'
dim='\033[2m'
cyan='\033[36m'
green='\033[32m'
yellow='\033[33m'
blue='\033[34m'
magenta='\033[35m'
red='\033[31m'
gray='\033[90m'
sep="${dim} · ${reset}"

# ── 1. Model ──────────────────────────────────────────────────────────────────
model=$(echo "$input" | jq -r '.model.display_name // empty')

# ── 2. CWD (abbreviated with ~) ───────────────────────────────────────────────
cwd_raw=$(echo "$input" | jq -r '.workspace.current_dir // empty')
cwd="${cwd_raw/#$HOME/~}"

# ── 2b. Project dir (show only when differs from cwd) ─────────────────────────
proj_dir=$(echo "$input" | jq -r '.workspace.project_dir // empty')
proj_part=""
if [ -n "$proj_dir" ] && [ "$proj_dir" != "$cwd_raw" ]; then
  proj_part="proj: $(basename "$proj_dir")"
fi

# ── 3. Git branch + dirty indicator ───────────────────────────────────────────
git_part=""
if [ -n "$cwd_raw" ] && git --no-optional-locks -C "$cwd_raw" rev-parse --is-inside-work-tree &>/dev/null 2>&1; then
  branch=$(git --no-optional-locks -C "$cwd_raw" symbolic-ref --short HEAD 2>/dev/null \
           || git --no-optional-locks -C "$cwd_raw" rev-parse --short HEAD 2>/dev/null)
  dirty=""
  if ! git --no-optional-locks -C "$cwd_raw" diff --quiet 2>/dev/null \
     || ! git --no-optional-locks -C "$cwd_raw" diff --cached --quiet 2>/dev/null; then
    dirty="*"
  fi
  [ -n "$branch" ] && git_part="${branch}${dirty}"
fi

# ── Bar helper: render a 5-cell ▓/░ bar for a given percentage (0-100) ────────
make_bar() {
  local pct_int="$1"
  local filled=$(( pct_int / 20 ))
  [ $filled -gt 5 ] && filled=5
  local empty=$(( 5 - filled ))
  local bar=""
  local i
  for ((i=0; i<filled; i++)); do bar="${bar}▓"; done
  for ((i=0; i<empty;  i++)); do bar="${bar}░"; done
  printf '%s' "$bar"
}

# ── 4. Context % + visual bar + size ──────────────────────────────────────────
ctx_pct=$(echo "$input" | jq -r '.context_window.used_percentage // .cost.context_window_percentage // empty')
ctx_part=""
if [ -n "$ctx_pct" ]; then
  pct_int=$(printf '%.0f' "$ctx_pct")
  bar=$(make_bar "$pct_int")
  ctx_size_raw=$(echo "$input" | jq -r '.context_window.context_window_size // empty')
  ctx_size_str=""
  if [ -n "$ctx_size_raw" ] && [ "$ctx_size_raw" != "null" ]; then
    if [ "$ctx_size_raw" -ge 1000000 ] 2>/dev/null; then
      ctx_size_str="$(( ctx_size_raw / 1000000 ))M"
    elif [ "$ctx_size_raw" -ge 1000 ] 2>/dev/null; then
      ctx_size_str="$(( ctx_size_raw / 1000 ))k"
    else
      ctx_size_str="$ctx_size_raw"
    fi
  fi
  if [ -n "$ctx_size_str" ]; then
    ctx_part="ctx ${pct_int}% [${bar}] (${ctx_size_str})"
  else
    ctx_part="ctx ${pct_int}% [${bar}]"
  fi
fi

# ── 5. 5h rate-limit % + visual bar (Pro/Max only) ───────────────────────────
five_h=$(echo "$input" | jq -r '.rate_limits.five_hour.used_percentage // empty')
five_part=""
if [ -n "$five_h" ]; then
  five_int=$(printf '%.0f' "$five_h")
  bar=$(make_bar "$five_int")
  five_part="5h ${five_int}% [${bar}]"
fi

# ── 6. 7d rate-limit % + visual bar (Pro/Max only) ───────────────────────────
seven_d=$(echo "$input" | jq -r '.rate_limits.seven_day.used_percentage // empty')
seven_part=""
if [ -n "$seven_d" ]; then
  seven_int=$(printf '%.0f' "$seven_d")
  bar=$(make_bar "$seven_int")
  seven_part="7d ${seven_int}% [${bar}]"
fi

# ── 7. Cost ───────────────────────────────────────────────────────────────────
cost_raw=$(echo "$input" | jq -r '.cost.total_cost_usd // empty')
cost_part=""
if [ -n "$cost_raw" ]; then
  cost_part=$(printf '$%.2f' "$cost_raw")
fi

# ── 8. Duration ───────────────────────────────────────────────────────────────
dur_ms=$(echo "$input" | jq -r '.cost.total_duration_ms // empty')
dur_part=""
if [ -n "$dur_ms" ]; then
  dur_s=$(( ${dur_ms%.*} / 1000 ))
  if [ "$dur_s" -lt 60 ]; then
    dur_part="${dur_s}s"
  else
    dur_m=$(( dur_s / 60 ))
    dur_rem=$(( dur_s % 60 ))
    if [ "$dur_rem" -eq 0 ]; then
      dur_part="${dur_m}m"
    else
      dur_part="${dur_m}m${dur_rem}s"
    fi
  fi
fi

# ── 9. Delta lines ────────────────────────────────────────────────────────────
lines_added=$(echo "$input" | jq -r '.cost.total_lines_added // empty')
lines_removed=$(echo "$input" | jq -r '.cost.total_lines_removed // empty')
lines_part=""
if [ -n "$lines_added" ] || [ -n "$lines_removed" ]; then
  la=${lines_added:-0}
  lr=${lines_removed:-0}
  lines_part="+${la} -${lr}"
fi

# ── Assemble ──────────────────────────────────────────────────────────────────
out=""

append() {
  local color="$1" text="$2"
  if [ -n "$text" ]; then
    [ -n "$out" ] && out="${out}${sep}"
    out="${out}${color}${text}${reset}"
  fi
}

append "${cyan}${bold}"  "$model"
append "${blue}"         "$cwd"
append "${gray}"         "$proj_part"
append "${green}"        "$git_part"
append "${yellow}"       "$ctx_part"
append "${magenta}"      "$five_part"
append "${red}"          "$seven_part"
append "${green}"        "$cost_part"
append "${dim}"          "$dur_part"
append "${cyan}"         "$lines_part"

printf "%b\n" "$out"

#!/usr/bin/env python3
"""
Claude Code hooks dispatcher.

Lit un payload JSON sur stdin, charge la config (~/.claude/hooks/config/handlers.json
+ override .local.json), trouve les handlers déclarés pour l'event, les exécute,
et écrit éventuellement une réponse JSON sur stdout.

Usage (depuis settings.json hooks) :
  python3 ~/.claude/hooks/py/dispatcher.py --event=PreCompact

Conventions handler:
- Fonction Python dans ~/.claude/hooks/py/handlers/<name>.py exposant
  `handle(payload: dict) -> dict | None`.
- handle() retourne None pour silence ou un dict {"action": "block"|"continue", ...}
  pour signaler une décision à Claude Code (PreToolUse/Stop seulement).

Tous les handlers sont best-effort : exception → log + continue (jamais bloquer
silencieusement le runtime).
"""
from __future__ import annotations

import argparse
import importlib.util
import json
import logging
import os
import sys
import traceback
from datetime import datetime
from pathlib import Path

ROOT = Path(__file__).resolve().parent
HOOKS_ROOT = ROOT.parent
CONFIG_DIR = HOOKS_ROOT / "config"
HANDLERS_DIR = ROOT / "handlers"
LOG_DIR = HOOKS_ROOT / "logs"

LOG_DIR.mkdir(parents=True, exist_ok=True)
HANDLERS_DIR.mkdir(parents=True, exist_ok=True)

logging.basicConfig(
    filename=LOG_DIR / "dispatcher.log",
    level=logging.INFO,
    format="%(asctime)s [%(levelname)s] %(message)s",
)
log = logging.getLogger("hooks-dispatcher")


def load_config() -> dict:
    """Merge handlers.json (shared) + handlers.local.json (perso, git-ignored)."""
    shared = CONFIG_DIR / "handlers.json"
    local = CONFIG_DIR / "handlers.local.json"
    merged: dict = {}
    for path in (shared, local):
        if not path.exists():
            continue
        try:
            with path.open("r", encoding="utf-8") as fh:
                data = json.load(fh)
                for event, handlers in data.items():
                    merged.setdefault(event, []).extend(handlers)
        except Exception as exc:
            log.warning("config %s invalide : %s", path.name, exc)
    return merged


def load_handler(name: str):
    """Charge dynamiquement handlers/<name>.py et renvoie sa fonction handle()."""
    path = HANDLERS_DIR / f"{name}.py"
    if not path.exists():
        log.warning("handler %s introuvable (%s)", name, path)
        return None
    try:
        spec = importlib.util.spec_from_file_location(f"handlers.{name}", path)
        module = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(module)  # type: ignore[union-attr]
        return getattr(module, "handle", None)
    except Exception as exc:
        log.error("import handler %s : %s", name, exc)
        log.debug(traceback.format_exc())
        return None


def main() -> int:
    parser = argparse.ArgumentParser()
    parser.add_argument("--event", required=True, help="Hook event name")
    args = parser.parse_args()
    event = args.event

    raw = sys.stdin.read()
    try:
        payload = json.loads(raw) if raw.strip() else {}
    except json.JSONDecodeError:
        log.warning("payload non-JSON sur %s : %r", event, raw[:200])
        payload = {"raw": raw}

    payload["_event"] = event
    payload["_ts"] = datetime.utcnow().isoformat() + "Z"

    config = load_config()
    handlers = config.get(event, [])
    if not handlers:
        log.info("event=%s aucun handler déclaré", event)
        return 0

    log.info("event=%s handlers=%d", event, len(handlers))

    decision: dict | None = None
    for entry in handlers:
        name = entry.get("name") if isinstance(entry, dict) else entry
        if not name:
            continue
        fn = load_handler(name)
        if fn is None:
            continue
        try:
            result = fn(payload)
            if isinstance(result, dict) and event in {"PreToolUse", "Stop"}:
                decision = result
        except Exception as exc:
            log.error("handler %s a levé %s", name, exc)
            log.debug(traceback.format_exc())

    if decision is not None:
        json.dump(decision, sys.stdout)
    return 0


if __name__ == "__main__":
    sys.exit(main())

#!/usr/bin/env zsh
# Aliases worktrees Claude Code
# Source ce fichier depuis ~/.zshrc :
#   [ -f "$HOME/.claude/aliases-worktrees.sh" ] && source "$HOME/.claude/aliases-worktrees.sh"
#
# Pattern Boris Cherny : 3-5 worktrees parallèles = "biggest productivity unlock".
# Chaque worktree = un Claude Code dédié avec scope réduit, pas de /compact nécessaire.

# ────────────────────────────────────────────────────────────
# Helpers de base
# ────────────────────────────────────────────────────────────

# Ouvre un worktree existant (ou erreur si absent).
# Usage : cwt <branch>
cwt() {
  local branch="$1"
  if [[ -z "$branch" ]]; then
    echo "Usage: cwt <branch>" >&2
    return 1
  fi
  local repo_root
  repo_root="$(git rev-parse --show-toplevel 2>/dev/null)" || {
    echo "cwt: pas dans un repo git" >&2
    return 1
  }
  local repo_name
  repo_name="$(basename "$repo_root")"
  local wt_path="$HOME/Dev/_worktrees/${repo_name}-${branch}"
  if [[ ! -d "$wt_path" ]]; then
    echo "cwt: worktree introuvable : $wt_path" >&2
    echo "→ créer via : cwt-new $branch" >&2
    return 1
  fi
  cd "$wt_path"
}

# Crée un nouveau worktree (branch déjà existante ou nouvelle) et y entre.
# Usage : cwt-new <branch> [base-branch]
cwt-new() {
  local branch="$1"
  local base="${2:-main}"
  if [[ -z "$branch" ]]; then
    echo "Usage: cwt-new <branch> [base-branch]" >&2
    return 1
  fi
  local repo_root
  repo_root="$(git rev-parse --show-toplevel 2>/dev/null)" || {
    echo "cwt-new: pas dans un repo git" >&2
    return 1
  }
  local repo_name
  repo_name="$(basename "$repo_root")"
  local wt_dir="$HOME/Dev/_worktrees"
  local wt_path="$wt_dir/${repo_name}-${branch}"
  mkdir -p "$wt_dir"
  if git show-ref --verify --quiet "refs/heads/${branch}"; then
    git worktree add "$wt_path" "$branch"
  else
    git worktree add -b "$branch" "$wt_path" "$base"
  fi
  cd "$wt_path"
}

# Liste les worktrees du repo courant.
cwt-ls() {
  git worktree list 2>/dev/null || echo "cwt-ls: pas dans un repo git" >&2
}

# Supprime un worktree (et sa branche optionnellement).
# Usage : cwt-rm <branch> [--with-branch]
cwt-rm() {
  local branch="$1"
  local with_branch="$2"
  if [[ -z "$branch" ]]; then
    echo "Usage: cwt-rm <branch> [--with-branch]" >&2
    return 1
  fi
  local repo_root
  repo_root="$(git rev-parse --show-toplevel 2>/dev/null)" || return 1
  local repo_name
  repo_name="$(basename "$repo_root")"
  local wt_path="$HOME/Dev/_worktrees/${repo_name}-${branch}"
  git worktree remove "$wt_path" || git worktree remove --force "$wt_path"
  if [[ "$with_branch" == "--with-branch" ]]; then
    git branch -D "$branch"
  fi
}

# ────────────────────────────────────────────────────────────
# Lancement Claude Code dans un worktree (3 raccourcis Boris-style)
# ────────────────────────────────────────────────────────────

# m = main : ouvrir un Claude dans le repo principal (pas worktree).
m() {
  local repo_root
  repo_root="$(git rev-parse --show-toplevel 2>/dev/null)" || {
    echo "m: pas dans un repo git" >&2
    return 1
  }
  cd "$repo_root" && claude "$@"
}

# f = feature : ouvrir/créer un worktree pour une branche feature et y lancer Claude.
# Usage : f <branch> [args claude]
f() {
  local branch="$1"
  shift
  if [[ -z "$branch" ]]; then
    echo "Usage: f <branch-name>" >&2
    return 1
  fi
  cwt-new "$branch" 2>/dev/null || cwt "$branch" || return 1
  claude "$@"
}

# a = analysis : worktree dédié à l'exploration/analyse en read-only.
# Usage : a [args claude] (worktree ${repo}-analysis fixé)
a() {
  cwt-new analysis 2>/dev/null || cwt analysis || return 1
  claude "$@"
}

# ────────────────────────────────────────────────────────────
# Aliases courts
# ────────────────────────────────────────────────────────────

alias gwt='git worktree'
alias gwtls='git worktree list'
  </script>

# speckit-impl — Implementer phase Spec-Kit

## Mission

Tu es le subagent d'implémentation pour le workflow **spec-kit**. Tu reçois en entrée :
- Une feature avec ses artefacts spec-kit déjà produits (`spec.md`, `plan.md`, `tasks.md`, optionnellement `analyze.md`).
- Un répertoire de travail (worktree git isolé, créé automatiquement via `isolation: worktree`).

## Discipline

1. **TDD strict** : pour chaque tâche du `tasks.md`, écris le test EN PREMIER, lance-le pour qu'il échoue, puis implémente le minimum pour le faire passer. Ne jamais écrire de code sans test préalable. Skill `superpowers:test-driven-development` est préchargé.

2. **Verification-before-completion** : ne jamais déclarer une tâche terminée sans :
   - Avoir lancé les tests et constaté qu'ils passent (output réel, pas inférence).
   - Avoir lancé le linter / type-checker.
   - Avoir lancé un build clean si applicable.
   Skill `superpowers:verification-before-completion` est préchargé.

3. **Quality gates** avant de rendre la main, dans l'ordre : verification → simplify → self-review → /security-review (si auth/crypto/secrets/payment/upload/permissions/SQL) → /codex:review → receiving-code-review → /code-review (si PR avec diff >50 lignes) → finishing-branch.

4. **Pas de Co-Authored-By Claude** dans les commits ni les PR. L'utilisateur est l'unique auteur.

5. **Contexte** : tu opères dans un worktree isolé. Le contexte parent t'a donné la spec ; tu n'as pas besoin de relire l'historique global. Si tu manques d'info, demande à l'utilisateur via une question ciblée plutôt que d'explorer toute la codebase.

## Pattern d'exécution

```
1. Read spec.md + plan.md + tasks.md
2. Pour chaque task numérotée dans tasks.md :
   a. Read le test target (ou les fichiers à modifier)
   b. Écrire le test (Red)
   c. Implémenter (Green)
   d. Refactor si nécessaire (Refactor) — skill `refactoring-skill` disponible
   e. Lancer les tests + lint + build → vérifier output réel
   f. Marquer task done dans tasks.md (avec un X dans la checkbox)
3. Une fois toutes les tasks faites, lancer quality gates dans l'ordre.
4. Reporter à l'utilisateur : ce qui a été fait, ce qui reste, les décisions techniques prises (5-10 lignes max).
```

## Outils délégués

- Tests qui échouent de façon inexpliquée → `Agent(subagent_type="test-validator", ...)` pour diagnostic isolé.
- Recherche large dans codebase → `Agent(subagent_type="Explore", ...)`.
- Review fin de chantier → skill `superpowers:requesting-code-review`.

## Communication

- **Pas de narration** : faire le travail, reporter à la fin.
- **Update intermédiaire** uniquement si : blocage > 5 min, décision technique non-évidente, scope creep détecté.
- **Final report** : 5-10 lignes max, structure : "fait / restant / décisions / artefacts produits".

# test-validator — Validation et diagnostic de tests

## Mission

Tu es un subagent spécialisé dans deux tâches liées :
1. **Validation** : confirmer qu'une suite de tests passe vraiment, en lançant les commandes et en lisant l'output réel (pas en inférant à partir du code).
2. **Diagnostic** : quand un test échoue de façon inattendue, identifier la cause racine (test mal écrit, bug réel, env, flakiness) et reporter un diagnostic actionnable.

## Discipline

- **Evidence before assertion** : ne jamais affirmer "les tests passent" sans avoir lancé la commande et constaté le code retour 0 + output positif. Skill `superpowers:verification-before-completion` préchargé.
- **Systematic debugging** : pour les échecs, suivre la méthode root-cause. Pas de bandaids. Skill `superpowers:systematic-debugging` préchargé.
- **Read-only sur le code applicatif** : tu n'as ni Write ni Edit. Si une correction est nécessaire, reporter au caller (speckit-impl ou l'utilisateur directement) avec localisation précise (fichier:ligne).

## Pattern d'exécution

### Mode validation
```
1. Lire le projet : package.json / pyproject.toml / Cargo.toml / etc. pour identifier le test runner.
2. Lancer la commande de test (npm test, pytest, cargo test, etc.) avec output complet.
3. Vérifier code retour + parser output : succès / échecs / skipped.
4. Reporter : "X tests passed, Y failed, Z skipped. [détails échecs si Y>0]"
```

### Mode diagnostic
```
1. Lire le test qui échoue.
2. Lire le code testé.
3. Lancer le test en isolation avec verbose / debug si possible.
4. Hypothèses : bug réel? Test mal écrit? Env? Flakiness? Dépendance manquante?
5. Vérifier chaque hypothèse avec une commande/lecture.
6. Reporter cause racine + correction proposée (sans la coder, juste localisation + description).
```

## Outils délégués

- Si la cause semble être un environnement cassé → reporter au caller, ne pas tenter de réparer.
- Si la cause est une vraie régression d'une feature ancienne → reporter au caller avec lien vers le commit suspect (`git blame`).

## Communication

- **Format strict** : "✅ PASSING" ou "❌ FAILING" en première ligne.
- Suivi : 5-15 lignes max avec les chiffres + diagnostics.
- Pas de narration de tes étapes — juste les résultats.

# /speckit-flow — Workflow spec-kit orchestré

Commande d'entrée pour lancer un cycle spec-kit complet avec séparation stricte des phases.

## Pattern : Command → Agent(research) → Agent(speckit-impl) → Quality gates

### Étape 0 — Capturer la demande

Si $ARGUMENTS est vide, demander à l'utilisateur :

- Dans quel projet / dossier ?

Lancer un Agent avec :
- `subagent_type: "Explore"`
- `model: haiku`
- Prompt : explorer le codebase pour la feature demandée. Identifier :
  - Les fichiers à modifier (anchors)
  - Les patterns existants à suivre
  - Les dépendances et contraintes techniques
  - Les tests existants dans le périmètre
- Retourner un rapport concis : anchors, patterns, contraintes, surface de test.

### Étape 2 — Spec & Plan (dans la conversation courante)

À partir du rapport research :
1. Invoquer le skill `superpowers-speckit` pour passer par les phases specify → clarify → plan → tasks → analyze.
2. Le plan généré est sauvegardé dans `./reports/` (plansDirectory configuré).
3. Valider le plan avec l'utilisateur avant de continuer.

### Étape 3 — Implement Agent (speckit-impl, Opus, worktree isolé)

Une fois le plan validé, lancer l'agent `speckit-impl` :

```

})

### Étape 4 — Quality Gates automatiques

Après retour de speckit-impl, exécuter dans l'ordre :

1. **verification** : skill `superpowers:verification-before-completion`
2. **simplify** : vérifier qu'aucune abstraction inutile n'a été introduite
3. **self-review** : relire le diff complet
4. **security-review** (conditionnel) : si auth/crypto/SQL/secrets/upload/permissions touchés → `/security-review`

6. **receiving-code-review** : appliquer le feedback du review
7. **code-review** (conditionnel) : si PR créée et diff >50 lignes → `/code-review`
8. **finishing-branch** : `/finishing-branch`

- Tâches implémentées
- Tests ajoutés
- Gates passés
- PR / branche créée
- Lien vers le plan dans `./reports/`
