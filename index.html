<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guide Claude Code - Configuration Philippe AutomatisIA.fr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..600,0..1,-25..0&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f1c; --surface: #111827; --surface2: #1f2937; --border: #334155;
      --accent: #38BDF8; --accent2: #A78BFA; --text: #e5e7eb; --muted: #94a3b8; --success: #34d399;
      --warn: #fbbf24; --danger: #f87171; --header-h: 64px; --side-w: 240px;
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.4), 0 2px 4px -2px rgba(0,0,0,.3);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.5), 0 4px 6px -4px rgba(0,0,0,.4);
      --radius: 10px; --radius-sm: 6px; --radius-lg: 14px;
      --font-sans: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9; --border: #e2e8f0;
      --accent: #0284C7; --accent2: #7c3aed; --text: #0f172a; --muted: #64748b; --success: #059669;
      --shadow-sm: 0 1px 2px 0 rgba(15,23,42,.06);
      --shadow-md: 0 4px 6px -1px rgba(15,23,42,.08), 0 2px 4px -2px rgba(15,23,42,.05);
      --shadow-lg: 0 10px 15px -3px rgba(15,23,42,.10), 0 4px 6px -4px rgba(15,23,42,.07);
    }
    @media (prefers-color-scheme: light) {
      [data-theme="system"] {
        --bg: #f8fafc; --surface: #ffffff; --surface2: #f1f5f9; --border: #e2e8f0;
        --accent: #0284C7; --accent2: #7c3aed; --text: #0f172a; --muted: #64748b; --success: #059669;
        --shadow-sm: 0 1px 2px 0 rgba(15,23,42,.06);
        --shadow-md: 0 4px 6px -1px rgba(15,23,42,.08), 0 2px 4px -2px rgba(15,23,42,.05);
        --shadow-lg: 0 10px 15px -3px rgba(15,23,42,.10), 0 4px 6px -4px rgba(15,23,42,.07);
      }
    }
    .material-symbols-outlined { font-family: "Material Symbols Outlined"; font-weight: 400; font-style: normal; line-height: 1; letter-spacing: normal; text-transform: none; display: inline-block; white-space: nowrap; word-wrap: normal; direction: ltr; -webkit-font-feature-settings: "liga"; -webkit-font-smoothing: antialiased; font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    .ms-fill { font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24; }
    .nav-icon.material-symbols-outlined { font-size: 20px; color: currentColor; opacity: .9; }
    .kicker-icon { font-size: 14px; vertical-align: -2px; margin-right: 4px; }
    .btn-icon { font-size: 18px; vertical-align: -3px; margin-right: 6px; }
    .btn-arrow { font-size: 18px; vertical-align: -3px; margin-left: 6px; }
    * { box-sizing: border-box; transition: background-color 200ms ease, border-color 200ms ease, color 200ms ease; }
    html, body { height: 100%; }
    body {
      margin: 0; font-family: var(--font-sans);
      background: var(--bg); color: var(--text); overflow: hidden;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      transition: background-color 200ms ease, color 200ms ease;
    }
    button, input { font: inherit; }
    .topbar {
      position: fixed; inset: 0 0 auto 0; height: var(--header-h); display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; background: color-mix(in srgb, var(--surface) 86%, transparent); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
      z-index: 20; transition: background-color 200ms ease, border-color 200ms ease;
      box-shadow: var(--shadow-sm);
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-mark { width: 38px; height: 38px; border-radius: var(--radius); display: grid; place-items: center; color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255,255,255,.18); position: relative; overflow: hidden; }
    .brand-mark::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,.20), transparent 60%); pointer-events: none; }
    .brand-mark .material-symbols-outlined { font-size: 22px; font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24; position: relative; z-index: 1; }
    .brand h1 { margin: 0; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 12px; letter-spacing: 0; }
    .theme-switch { display: flex; gap: 2px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 3px; box-shadow: var(--shadow-sm); }
    .theme-btn { border: 0; background: transparent; color: var(--muted); border-radius: 7px; padding: 6px 9px; cursor: pointer; min-width: 36px; display: grid; place-items: center; transition: all 180ms ease; }
    .theme-btn:hover { color: var(--text); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .theme-btn.active { color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: var(--shadow-sm); }
    .theme-btn .material-symbols-outlined { font-size: 18px; }
    .sidebar {
      position: fixed; left: 0; top: var(--header-h); bottom: 0; width: var(--side-w); overflow-y: auto;
      background: color-mix(in srgb, var(--surface) 94%, var(--bg)); border-right: 1px solid var(--border); padding: 16px 12px;
      transition: background-color 200ms ease, border-color 200ms ease;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .memory-children { display: none; margin-left: 22px; padding-left: 10px; border-left: 1px solid var(--border); margin-top: 2px; }
    .nav-item, .memory-head {
      width: 100%; display: flex; align-items: center; gap: 10px; min-height: 40px; padding: 8px 10px;
      border: 1px solid transparent; border-radius: 9px; color: var(--text); cursor: pointer; background: transparent; text-align: left;
      font-family: inherit; transition: all 180ms ease;
    }
    .nav-item:hover, .memory-head:hover { background: color-mix(in srgb, var(--accent) 8%, var(--surface2)); border-color: color-mix(in srgb, var(--border) 70%, transparent); }
    .nav-item:hover .nav-icon { color: var(--accent); }
    .nav-item.active { border-color: color-mix(in srgb, var(--accent) 60%, transparent); background: color-mix(in srgb, var(--accent) 16%, transparent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 25%, transparent); }
    .nav-item.active .nav-icon { color: var(--accent); opacity: 1; font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24; }
    .nav-icon { width: 22px; text-align: center; flex: 0 0 auto; color: var(--muted); transition: color 180ms ease; }
    .nav-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
    .nav-count { color: var(--muted); font-size: 11px; font-weight: 700; padding: 2px 6px; background: var(--surface2); border-radius: 999px; }
    .nav-item.active .nav-count { color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, transparent); }
    .chev { color: var(--muted); transition: transform 220ms ease; font-size: 18px !important; }
    .memory-group.open .chev { transform: rotate(90deg); }
    .memory-group.open .memory-children { display: block; }
    .side-progress { border-top: 1px solid var(--border); margin-top: 18px; padding: 18px 10px 8px; }
    .progress-track { height: 6px; border-radius: 999px; background: var(--surface2); overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 220ms ease; border-radius: 999px; }
    .progress-label { margin-top: 10px; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
    .content {
      position: fixed; left: var(--side-w); right: 0; top: var(--header-h); bottom: 0; overflow-y: auto;
      padding: 26px clamp(18px, 4vw, 54px) 54px; scroll-behavior: smooth;
    }
    .module-panel { display: none; max-width: 980px; margin: 0 auto; }
    .module-panel.active { display: block; }
    .module-hero { display: grid; grid-template-columns: 1fr auto; gap: 22px; align-items: end; margin-bottom: 24px; }
    .module-kicker { color: var(--accent); font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .12em; display: inline-flex; align-items: center; gap: 6px; }
    .module-title { margin: 10px 0 10px; font-size: clamp(28px, 4.5vw, 46px); font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; }
    .module-desc { margin: 0; color: var(--muted); line-height: 1.65; max-width: 740px; font-size: 14.5px; }
    .module-meter { min-width: 120px; padding: 14px 18px; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius); text-align: center; box-shadow: var(--shadow-sm); }
    .module-meter strong { display: block; font-size: 28px; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); }
    .module-meter span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; font-weight: 600; }
    .steps { display: grid; gap: 10px; }
    .step { border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); overflow: hidden; transition: all 200ms ease; box-shadow: var(--shadow-sm); }
    .step:hover:not(.locked):not(.done) { border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); box-shadow: var(--shadow-md); }
    .step.expanded { border-color: color-mix(in srgb, var(--accent) 50%, var(--border)); box-shadow: var(--shadow-md); }
    .step.locked { opacity: .35; pointer-events: none; }
    .step.done { background: color-mix(in srgb, var(--success) 8%, var(--surface)); border-color: color-mix(in srgb, var(--success) 35%, var(--border)); }
    .step-hdr { min-height: 56px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .step-chk { width: 24px; height: 24px; border-radius: 7px; border: 2px solid var(--border); flex: 0 0 auto; display: grid; place-items: center; background: var(--surface2); transition: all 200ms ease; }
    .step:hover:not(.done) .step-chk { border-color: color-mix(in srgb, var(--accent) 50%, var(--border)); }
    .step.done .step-chk { background: var(--success); border-color: var(--success); color: #fff; }
    .step.done .step-chk::after { content: "check"; font-family: "Material Symbols Outlined"; font-weight: 600; font-size: 16px; font-variation-settings: "FILL" 1, "wght" 600; }
    .step-title { flex: 1; font-weight: 650; font-size: 14.5px; line-height: 1.35; letter-spacing: -0.01em; }
    .step.done .step-title { text-decoration: line-through; color: color-mix(in srgb, var(--text) 50%, var(--muted)); }
    .step-badge { display: none; color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 999px; padding: 3px 9px; font-size: 10px; font-weight: 700; letter-spacing: .08em; box-shadow: var(--shadow-sm); }
    .step.expanded:not(.done) .step-badge { display: inline-flex; }
    .step-body { display: none; border-top: 1px solid color-mix(in srgb, var(--border) 60%, transparent); padding: 16px; background: color-mix(in srgb, var(--surface2) 35%, transparent); }
    .step.expanded .step-body { display: block; }
    .step.done:not(.expanded) .step-body { display: none; }
    .tabs-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px; padding: 4px; background: var(--surface2); border-radius: 9px; width: fit-content; }
    .tab-btn { border: 0; background: transparent; color: var(--muted); border-radius: 7px; padding: 7px 14px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 12.5px; letter-spacing: -0.005em; transition: all 180ms ease; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); background: var(--surface); box-shadow: var(--shadow-sm); }
    .tab-pane { display: none; color: var(--text); line-height: 1.65; font-size: 14px; }
    .tab-pane.visible { display: block; }
    .tab-pane p { margin: 0 0 12px; }
    .tab-pane ul { margin: 0 0 12px 18px; padding: 0; }
    .tab-pane li { margin: 6px 0; }
    .code-wrap { position: relative; margin: 12px 0 16px; }
    .code-block, .prompt-text {
      margin: 0; white-space: pre-wrap; word-break: break-word; overflow-x: auto;
      background: #0b1220; color: #e2e8f0; border: 1px solid #1e293b; border-radius: var(--radius); box-shadow: var(--shadow-sm);
      padding: 16px 18px; font-family: var(--font-mono); font-size: 12.5px; line-height: 1.6;
    }
    .copy-btn, .copy-prompt-btn {
      position: absolute; right: 10px; top: 10px; border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      background: color-mix(in srgb, var(--accent) 18%, #0b1220); color: #e0f2fe; border-radius: 7px; padding: 6px 11px; cursor: pointer; font-family: inherit; font-size: 11.5px; font-weight: 700; letter-spacing: -0.005em; transition: all 180ms ease;
    }
    .copy-btn:hover, .copy-prompt-btn:hover { background: color-mix(in srgb, var(--accent) 30%, #0b1220); transform: translateY(-1px); }
    .copy-prompt-btn { position: static; margin-top: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: 0; padding: 9px 14px; font-size: 13px; }
    .claude-btn { margin: 18px 0 14px; border: 0; color: #fff; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: var(--radius); padding: 12px 18px; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 14px; letter-spacing: -0.005em; display: inline-flex; align-items: center; box-shadow: var(--shadow-md); transition: all 200ms ease; }
    .claude-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .claude-btn:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
    .prompt-panel { display: none; border: 1px solid var(--border); background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 22px; box-shadow: var(--shadow-sm); }
    .prompt-panel.open { display: block; }
    .prompt-note { margin: 0 0 10px; color: var(--muted); }
    .tip { border-left: 3px solid var(--accent); background: var(--surface2); border-radius: 0 8px 8px 0; padding: 10px 12px; color: var(--text); margin: 12px 0; }
    .module-purpose { display: flex; gap: 16px; align-items: flex-start; border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border)); border-left: 4px solid var(--accent); background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 14%, var(--surface)) 0%, var(--surface) 75%); border-radius: 0 var(--radius) var(--radius) 0; padding: 18px 20px; margin: 0 0 24px; box-shadow: var(--shadow-sm); }
    .module-purpose .purpose-icon { font-size: 22px; flex: 0 0 auto; line-height: 1.3; color: var(--accent); margin-top: 2px; }
    .module-purpose .purpose-text { flex: 1; min-width: 0; }
    .module-purpose .purpose-head { font-size: 10.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--accent); margin: 0 0 8px; }
    .module-purpose .purpose-text p { margin: 0 0 10px; line-height: 1.6; color: var(--text); font-size: 14px; }
    .module-purpose .purpose-text p:last-child { margin: 0; }
    .module-purpose .purpose-text strong { color: var(--accent); font-weight: 700; }
    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .topbar { position: sticky; }
      .sidebar { position: sticky; top: var(--header-h); width: 100%; height: auto; max-height: 45vh; border-right: 0; border-bottom: 1px solid var(--border); z-index: 15; }
      .content { position: static; padding: 20px 14px 44px; }
      .module-hero { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-theme="dark">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"><span class="material-symbols-outlined">terminal</span></div>
      <div>
        <h1>Configuration Claude Code</h1>
        <p>Guide interactif pour reproduire l'environnement de Philippe AutomatisIA.fr</p>
      </div>
    </div>
    <div class="theme-switch" aria-label="Theme">
      <button class="theme-btn" data-theme-choice="dark" title="Theme sombre" aria-label="Theme sombre"><span class="material-symbols-outlined">dark_mode</span></button>
      <button class="theme-btn" data-theme-choice="light" title="Theme clair" aria-label="Theme clair"><span class="material-symbols-outlined">light_mode</span></button>
      <button class="theme-btn" data-theme-choice="system" title="Theme système" aria-label="Theme système"><span class="material-symbols-outlined">settings_brightness</span></button>
    </div>
  </header>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="content" id="content"></main>
  <canvas class="confetti" id="confetti"></canvas>

  <script>
    const MODULES = [
      { id: "base", icon: "build", short: "Installation de base", title: "Installation de base", desc: "Installe les fondations macOS: Homebrew, outils CLI, Claude Code et Comet.", purpose: ["Tout ce qui suit suppose que ces outils sont installés. Sans Homebrew, jq, git, node ou Claude Code, les modules suivants échoueront en cascade — pas de hooks, pas de plugins, pas de mémoire interrogeable.", "**Le gain** : zéro friction technique pour activer toutes les optimisations qui viennent ensuite. Compte 10-15 minutes une fois pour toutes."], steps: [
        { title: "Installer Homebrew", concept: ["Homebrew est le gestionnaire de paquets macOS standard.", "Il permet d'installer git, node, jq, tmux et RTK avec des commandes reproductibles."], commandes: ["/bin/bash -c \"$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)\""], verify: ["brew --version"] },
        { title: "Installer les outils de base", concept: ["git gere le versioning, node fournit npm et l'ecosysteme JavaScript, jq parse le JSON des hooks, tmux organise les sessions multi-agents."], commandes: ["brew install git node jq tmux"], verify: ["git --version && node --version && jq --version && tmux -V"] },
        { title: "Installer Claude Code CLI", concept: ["Le CLI officiel d'Anthropic lit sa configuration dans ~/.claude/.", "L'option --dangerously-skip-permissions sera isolee dans un wrapper dedie pour l'acces distant via Telegram."], commandes: ["npm install -g @anthropic-ai/claude-code"], verify: ["claude --version"] },
        { title: "Installer Comet browser", concept: ["Comet est un navigateur Chromium modifie utilise comme base de l'automatisation browser avec dev-browser.", "Il exposera un port de debug local 9222 que le script comet-debug peut ouvrir automatiquement."], commandes: ["# Telecharge Comet depuis https://www.comet.so puis glisse Comet.app dans /Applications"], verify: ["ls /Applications/Comet.app && echo \"✓ Comet installe\""] }
      ]},
      { id: "statusline", icon: "speed", short: "Statusline", title: "Statusline custom", desc: "Statusline dense en une ligne : modèle · cwd · projet · git · ctx % avec barre + (200k) · 5h % · 7d % · cost · durée · ±lignes. Lit le JSON envoyé par Claude Code à chaque rendu.", purpose: ["Sans statusline custom, tu ne vois ni la consommation contexte, ni les rate limits 5h/7d (Pro/Max), ni le coût cumulé de la session. Tu découvres trop tard que tu as brûlé ton quota ou que ta session est saturée.", "**Le gain** : visibilité en temps réel — tu sais quand /clear (à ~70% contexte), quand ralentir (rate limit qui monte), et quand un agent a coûté plus que prévu. L'info que tu cherchais via /status est désormais permanente."], steps: [
        { title: "Concept : ce que la statusline lit et affiche", concept: ["Claude Code passe à chaque rendu un JSON sur stdin avec les champs : model.display_name, workspace.current_dir, workspace.project_dir, context_window.{used_percentage,context_window_size}, rate_limits.{five_hour,seven_day}.used_percentage, cost.{total_cost_usd,total_duration_ms,total_lines_added,total_lines_removed}.", "Le script bash parse ce JSON avec jq et compose une ligne dense avec couleurs ANSI et barres de progression unicode (▓ / ░).", "Champs affichés (séparés par ' · ') : modèle (cyan bold) · cwd abrégé en ~/ (bleu) · proj: <name> si différent du cwd (gris) · git branch + * si dirty (vert) · ctx % avec barre + taille de contexte (jaune) · 5h % avec barre (magenta) · 7d % avec barre (rouge) · coût $ (vert) · durée (dim) · ±lignes (cyan).", "Avantage : tu vois en permanence la consommation contexte, les rate limits 5h/7d (utiles sur Pro/Max), le coût cumulé. Pas besoin de /status."]},
        { title: "Créer le script ~/.claude/statusline.sh", concept: ["Prérequis : jq installé (brew install jq), git présent, locale C en tête de script (export LC_ALL=C — sinon printf '%.2f' échoue avec LC_NUMERIC=fr_FR sur le coût).", "Le script doit écrire UNE seule ligne par invocation, exécutable (chmod +x).", "Pour macOS, attention au backslash dans la substitution paramètre tilde (utiliser ${var/#$HOME/~} sans escape)."], commandes: ["mkdir -p ~/.claude\n# Copier le contenu de src-statusline ci-dessous dans :\n#   ~/.claude/statusline.sh\nchmod +x ~/.claude/statusline.sh\n\n# Test à sec avec un payload factice :\necho '{\"model\":{\"display_name\":\"Sonnet\"},\"workspace\":{\"current_dir\":\"'$PWD'\"},\"context_window\":{\"used_percentage\":42,\"context_window_size\":200000},\"cost\":{\"total_cost_usd\":1.23,\"total_duration_ms\":75000,\"total_lines_added\":12,\"total_lines_removed\":3}}' | ~/.claude/statusline.sh"], verify: ["test -x ~/.claude/statusline.sh && echo '✓ statusline exécutable'"], src: "src-statusline" },
        { title: "Activer dans settings.json", concept: ["settings.json déclare la statusLine via une commande shell. Claude Code l'invoque à chaque rendu et lit la première ligne stdout.", "Format : { \"statusLine\": { \"type\": \"command\", \"command\": \"<chemin absolu>\" } }."], commandes: ["S=~/.claude/settings.json\n[ ! -f \"$S\" ] && echo '{}' > \"$S\"\njq --arg cmd \"$HOME/.claude/statusline.sh\" '.statusLine = {\"type\":\"command\",\"command\":$cmd}' \"$S\" > /tmp/cc.json && mv /tmp/cc.json \"$S\""], verify: ["jq '.statusLine' ~/.claude/settings.json"] }
      ]},
      { id: "rtk", icon: "savings", short: "Tokens — RTK", title: "Gestion des tokens — RTK", desc: "Réduit les tokens consommés par les commandes shell de 60–90 % grâce à des variantes compactes transparentes. Inclut /advisor, le reviewer Opus indépendant qui valide les approches avant d'implémenter.", purpose: ["Les commandes shell (git, ls, grep, npm) consomment beaucoup de tokens via leurs sorties verbeuses qui finissent dans le contexte. RTK les réécrit en variantes compactes, transparentes pour Claude — 60 à 90 % d'économie sur les opérations de dev courantes.", "**Le gain** : sessions 3-5× plus longues sans /compact, et /advisor (un reviewer Opus indépendant qui voit toute la conversation) qui valide les approches AVANT 300 lignes de code raté. Un appel /advisor coûte souvent 10× moins qu'un refactoring après-coup."], steps: [
        { title: "Installer RTK", concept: ["RTK (Rust Token Killer) réécrit les commandes shell de Claude Code en variantes compactes.", "Résultat : 60-90% de tokens économisés sur git, ls, grep, npm. Transparent — aucune action manuelle pendant les sessions.", "Prérequis : jq doit être installé (brew install jq).", "Repo : https://github.com/rtk-ai/rtk — installation via cargo ou Homebrew selon disponibilité."], commandes: ["# Via Homebrew (si disponible) :\nbrew install rtk\n\n# Ou via Cargo (Rust) :\ncargo install rtk\n\nrtk --version"], verify: ["rtk --version && which rtk && jq --version"] },
        { title: "Installer le hook de reecriture", concept: ["Le hook PreToolUse lit la commande Bash demandee par Claude, appelle rtk rewrite, puis renvoie une entree corrigee a Claude Code.", "Les erreurs RTK sont non bloquantes: le workflow continue avec la commande originale."], commandes: ["mkdir -p ~/.claude/hooks", "pbpaste > ~/.claude/hooks/rtk-rewrite.sh", "chmod +x ~/.claude/hooks/rtk-rewrite.sh"], verify: ["~/.claude/hooks/rtk-rewrite.sh < /dev/null || true"], src: "src-rtk-rewrite" },
        { title: "Declarer le hook dans settings.json", concept: ["Claude Code charge les hooks depuis ~/.claude/settings.json.", "Le matcher Bash limite cette reecriture aux commandes shell."], commandes: ["jq '.hooks.PreToolUse += [{\"matcher\":\"Bash\",\"hooks\":[{\"type\":\"command\",\"command\":\"$HOME/.claude/hooks/rtk-rewrite.sh\"}]}]' ~/.claude/settings.json > /tmp/cc-settings.json && mv /tmp/cc-settings.json ~/.claude/settings.json"], verify: ["jq '.hooks.PreToolUse' ~/.claude/settings.json"] },
        { title: "/advisor — second regard Opus indépendant", concept: ["advisor() (ou /advisor dans le prompt Claude Code) invoque Claude Opus comme reviewer indépendant sur la session en cours.", "Il voit l'intégralité de la conversation : chaque outil appelé, chaque résultat, chaque décision prise — sans le biais du travail en cours.", "À invoquer AVANT de s'engager sur une approche complexe, AVANT de déclarer une tâche terminée, et quand on est bloqué depuis plus d'un échange.", "Lien direct avec les tokens : valider l'approche AVANT d'implémenter 300 lignes évite les refactorings coûteux. Un appel Opus économise souvent 10× plus qu'il ne consomme.", "Configuré automatiquement via advisorModel: 'opus' dans settings.json — installé dans le module Plugins. Aucune action supplémentaire."], commandes: ["# Dans Claude Code, à tout moment :\n# advisor()\n#\n# ou taper dans le prompt :\n# /advisor\n\n# Moments clés pour l'invoquer :\n# - Avant de choisir une architecture\n# - Avant de déclarer 'c'est terminé'\n# - Quand un bug résiste depuis 2+ échanges"], verify: ["jq '.advisorModel' ~/.claude/settings.json"] }
      ]},
      { id: "memory-md", group: "memory", icon: "description", short: "Fichiers .md", title: "Mémoire — Fichiers .md", desc: "Pose une mémoire lisible par humains. CLAUDE.md pour les règles comportementales courtes, MEMORY.md comme index chargé à la demande pour alléger le contexte.", purpose: ["Sans CLAUDE.md, Claude oublie tes préférences à chaque session — tu réexpliques les mêmes règles (langue, style, conventions) à chaque démarrage. Sans MEMORY.md indexé via @MEMORY.md, tout part dans le contexte au démarrage et l'asphyxie même quand l'info n'est pas pertinente pour la tâche.", "**Le gain** : tes règles persistent et sont chargées automatiquement, mais les détails projet (architecture, credentials, décisions) ne pèsent dans le contexte que quand Claude en a besoin. Le contexte reste léger même sur un projet documenté en profondeur."], steps: [
        { title: "Creer la memoire globale", concept: ["~/.claude/CLAUDE.md contient les preferences valables dans tous les projets.", "Elle doit rester courte, concrete et orientee comportement.", "⚠️ La commande ci-dessous crée le fichier seulement s'il n'existe pas encore. Si tu en as déjà un, ajoute les lignes manuellement."], commandes: ["mkdir -p ~/.claude\n# Créer uniquement si absent (ne pas écraser)\n[ ! -f ~/.claude/CLAUDE.md ] && cat > ~/.claude/CLAUDE.md <<'EOF'\n# Preferences globales\n- Repondre en francais sauf demande contraire.\n- Lire le code avant de proposer une modification.\n- Preferer rg pour chercher et des patches scopes.\nEOF\n[ -f ~/.claude/CLAUDE.md ] && echo '✓ ~/.claude/CLAUDE.md existe' || echo '✗ erreur'"], verify: ["sed -n '1,20p' ~/.claude/CLAUDE.md"] },
        { title: "Ajouter une memoire projet", concept: ["Un fichier CLAUDE.md a la racine d'un depot specialise les regles pour ce projet.", "Il prime sur les habitudes generales quand il documente une contrainte locale.", "Les commandes utilisent >> (append) — elles n'écrasent pas le contenu existant."], commandes: ["# Si CLAUDE.md n'existe pas encore dans ce projet :\n[ ! -f CLAUDE.md ] && printf '# Mémoire projet\\n' > CLAUDE.md\n\n# Ajouter les sections utiles (append — ne pas écraser) :\ncat >> CLAUDE.md <<'EOF'\n\n## Configuration\n- Commande de test : npm test\n- Style : conserver les composants existants.\n- Ne pas modifier les migrations sans demande explicite.\nEOF"], verify: ["test -f CLAUDE.md && sed -n '1,20p' CLAUDE.md"] },
        { title: "Organiser les notes longues", concept: ["Les notes volumineuses restent dans Docs/ ou .claude/memories/ pour ne pas saturer CLAUDE.md.", "CLAUDE.md peut pointer vers ces fichiers quand ils sont utiles."], commandes: ["mkdir -p Docs .claude/memories", "printf '# Decisions\\n\\n- 2026-04-15: initialisation memoire.\\n' > .claude/memories/decisions.md"], verify: ["find .claude/memories -maxdepth 1 -type f -name '*.md' -print"] },
        { title: "Stratégie de split CLAUDE.md / MEMORY.md", concept: ["Problème : si tout est dans CLAUDE.md, le contexte grossit à chaque session — même les informations non pertinentes pour la tâche en cours.", "Solution : CLAUDE.md contient UNIQUEMENT les règles comportementales actives (< 200 lignes). Les détails projet vont dans MEMORY.md, chargé à la demande via la directive @MEMORY.md.", "Règle de split : une règle comportementale → CLAUDE.md. Un fait projet, une credential, une décision architecturale, une note de déploiement → fichier lié dans MEMORY.md.", "Exemple : CLAUDE.md contient '- Répondre en français' et '@~/.claude/memory/MEMORY.md'. MEMORY.md contient l'index vers decisions.md, stack.md, credentials.md.", "Résultat : Claude ne charge que ce dont il a besoin. Le contexte reste léger même sur des projets documentés en profondeur."], commandes: ["# 1. Créer l'index MEMORY.md du projet\nPROJ=$(basename $PWD)\nMEM_DIR=~/.claude/projects/$PROJ/memory\nmkdir -p \"$MEM_DIR\"\ncat > \"$MEM_DIR/MEMORY.md\" <<'EOF'\n# Mémoire Projet — Index\n\n## Stack & Architecture\n- [Stack](stack.md)\n\n## Décisions\n- [Décisions](decisions.md)\n\n## Déploiement\n- [Déploiement](deployment.md)\nEOF\n\n# 2. Référencer MEMORY.md depuis CLAUDE.md global\ngrep -q 'MEMORY.md' ~/.claude/CLAUDE.md || \\\n  echo \"\\n# Mémoire projet active\\n@$MEM_DIR/MEMORY.md\" >> ~/.claude/CLAUDE.md\n\necho '✓ Split CLAUDE.md / MEMORY.md configuré'"], verify: ["grep 'MEMORY.md' ~/.claude/CLAUDE.md && echo '✓ référence OK' || echo '✗ référence manquante'"] }
      ]},
      { id: "memory-sqlite", group: "memory", icon: "database", short: "SQLite", title: "Mémoire — SQLite", desc: "Ajoute une memoire structuree locale pour decisions, snippets, preferences et recherches.", purpose: ["Markdown excelle pour la narration et les guides. Mais les faits atomiques (une préférence de style, une décision datée, un snippet réutilisable) y sont noyés dans la prose. SQLite les rend interrogeables : `cc-mem get <mot>` retrouve instantanément au lieu de relire 200 lignes de doc.", "**Le gain** : Claude trouve une décision passée en 1 commande au lieu de spéculer ou de relire la doc. Idéal pour les préférences cross-projets, les snippets fréquents, les décisions architecturales avec leur date."], steps: [
        { title: "Installer sqlite et creer le dossier", concept: ["SQLite donne une memoire locale robuste, rapide et sans serveur.", "Elle complete les fichiers Markdown pour les donnees interrogeables."], commandes: ["brew install sqlite", "mkdir -p ~/.claude/memory"], verify: ["sqlite3 --version && test -d ~/.claude/memory"] },
        { title: "Initialiser le schema", concept: ["Une table memories simple suffit: type, cle, valeur, tags et dates.", "Le couple type/key evite les doublons accidentels."], commandes: ["sqlite3 ~/.claude/memory/philippe.db <<'SQL'\nCREATE TABLE IF NOT EXISTS memories (\n  id INTEGER PRIMARY KEY,\n  type TEXT NOT NULL,\n  key TEXT NOT NULL,\n  value TEXT NOT NULL,\n  tags TEXT DEFAULT '',\n  created_at TEXT DEFAULT CURRENT_TIMESTAMP,\n  updated_at TEXT DEFAULT CURRENT_TIMESTAMP,\n  UNIQUE(type, key)\n);\nSQL"], verify: ["sqlite3 ~/.claude/memory/philippe.db '.schema memories'"] },
        { title: "Ajouter des commandes utilitaires", concept: ["Un petit script cc-mem rend la memoire utilisable depuis Claude Code sans requetes manuelles."], commandes: ["cat > ~/.claude/cc-mem <<'EOF'\n#!/usr/bin/env bash\nDB=\"$HOME/.claude/memory/philippe.db\"\ncase \"$1\" in\n  add) sqlite3 \"$DB\" \"INSERT OR REPLACE INTO memories(type,key,value,tags,updated_at) VALUES('$2','$3','$4','${5:-}',CURRENT_TIMESTAMP);\" ;;\n  list) sqlite3 -header -column \"$DB\" \"SELECT type,key,tags,updated_at FROM memories ORDER BY updated_at DESC LIMIT 40;\" ;;\n  get) sqlite3 -line \"$DB\" \"SELECT * FROM memories WHERE key LIKE '%$2%' OR tags LIKE '%$2%';\" ;;\n  *) echo \"usage: cc-mem add type key value [tags] | list | get query\" ;;\nesac\nEOF\nchmod +x ~/.claude/cc-mem"], verify: ["~/.claude/cc-mem list"] },
        { title: "Documenter l'usage pour Claude", concept: ["SQLite excelle pour les données atomiques : une préférence = une ligne, une décision = une ligne, un snippet = une ligne. Pas de paragraphes — des faits.", "Quand utiliser SQLite vs Markdown : SQLite pour les données interrogeables (recherche par mot-clé, filtrage par type, tri par date). Markdown pour la narration, les décisions argumentées, les guides.", "Claude doit consulter SQLite quand il cherche une préférence de style, une décision passée, un snippet réutilisable — AVANT de faire des hypothèses.", "Types utiles en pratique : 'pref' (préférences de style/comportement), 'decision' (choix architecturaux datés), 'snippet' (commandes fréquentes), 'credential' (références — jamais les valeurs), 'note' (observations de session)."], commandes: ["cat >> ~/.claude/CLAUDE.md <<'EOF'\n\n## Mémoire SQLite (~/.claude/cc-mem)\nSQLite stocke des données atomiques interrogeables — une ligne = un fait précis.\n\nQuand consulter :\n- Avant toute décision de style ou d'architecture : ~/.claude/cc-mem get <mot-clé>\n- Pour lister les décisions récentes : ~/.claude/cc-mem list\n- En début de session sur un projet connu : ~/.claude/cc-mem get <nom-projet>\n\nTypes de données stockées :\n- pref : préférences (ex: type=pref key=lang value=français)\n- decision : choix datés (ex: type=decision key=orm value='Prisma — 2026-04')\n- snippet : commandes réutilisables\n- note : observations de session\n\nNe jamais stocker : mots de passe, tokens, clés API (utiliser les fichiers curated).\nEOF"], verify: ["grep -n \"Mémoire SQLite\" ~/.claude/CLAUDE.md"] }
      ]},
      { id: "memory-claudemem", group: "memory", icon: "neurology", short: "claude-mem", title: "Mémoire — claude-mem", desc: "Installe un workflow de memoire plus automatique pour capturer et retrouver les informations utiles.", purpose: ["Toutes les découvertes de session (bugs résolus, patterns trouvés, décisions techniques implicites) disparaissent à `/exit`. Sans capture automatique, tu retombes dans le même piège la session suivante et tu re-débogues le même bug.", "**Le gain** : capture automatique via hooks (tu ne touches jamais à l'outil), recherche sémantique cross-sessions ('avons-nous déjà vu ce bug ?', 'qu'a-t-on fait la dernière fois sur X ?'), timeline chronologique. Compense l'amnésie inter-sessions de Claude."], steps: [
        { title: "Installer claude-mem", concept: ["claude-mem automatise la capture de souvenirs developpeur et leur recherche.", "Il est utile pour les preferences frequentes, les decisions projet et les raccourcis."], commandes: ["npm install -g claude-mem"], verify: ["claude-mem --version || npx claude-mem --version"] },
        { title: "Initialiser le stockage", concept: ["L'initialisation cree le dossier de donnees et la configuration locale.", "Garde ce stockage dans le home pour le partager entre projets."], commandes: ["claude-mem init --dir ~/.claude/claude-mem"], verify: ["test -d ~/.claude/claude-mem && find ~/.claude/claude-mem -maxdepth 2 -type f | head"] },
        { title: "Ajouter des alias pratiques", concept: ["Des alias courts encouragent l'usage reel: memoriser, chercher, lister.", "Le but est de rendre la memoire plus rapide qu'une note manuelle."], commandes: ["cat >> ~/.zshrc <<'EOF'\nalias cm-add='claude-mem add'\nalias cm-find='claude-mem search'\nalias cm-list='claude-mem list'\nEOF"], verify: ["tail -n 5 ~/.zshrc"] },
        { title: "Relier claude-mem a CLAUDE.md", concept: ["Claude doit utiliser claude-mem quand une information semble deja avoir ete decidee.", "La recherche memoire doit preceder les hypotheses sur les preferences personnelles."], commandes: ["cat >> ~/.claude/CLAUDE.md <<'EOF'\n\n## claude-mem\n- Avant une decision de style ou d'architecture personnelle, chercher avec claude-mem search.\n- Ajouter les preferences stables avec claude-mem add.\nEOF"], verify: ["grep -n \"claude-mem\" ~/.claude/CLAUDE.md"] }
      ]},
      { id: "memory-coord", group: "memory", icon: "hub", short: "Coordination mémoire", title: "Mémoire — Coordination des 3 briques", desc: "Directives précises pour que Claude orchestre les 3 briques de mémoire de façon optimale : quand lire quoi, quand écrire où, comment éviter les doublons.", purpose: ["3 systèmes de mémoire (fichiers curatés, SQLite, claude-mem) = 3 risques de duplication, 3 risques d'inconsistance. Sans règles de routage, Claude réécrit la même info 3 fois ou cherche au mauvais endroit, et l'utilisateur ne sait plus où est la source de vérité.", "**Le gain** : une table de décision claire dans CLAUDE.md — Claude sait OÙ chercher (et écrire) selon le type d'info, sans hésitation. Le système devient cohérent au lieu de redondant."], steps: [
        { title: "Vue d'ensemble : 3 briques complémentaires", concept: ["Brique 1 — Fichiers curatés (CLAUDE.md + MEMORY.md + fichiers liés) : source de vérité pour les règles comportementales, credentials, architecture, feedback corrections. Persistance longue. Édition manuelle ou par Claude.", "Brique 2 — SQLite (cc-mem) : données atomiques et interrogeables — préférences, décisions datées, snippets, notes de session. Requêtes par mot-clé, type ou date.", "Brique 3 — claude-mem (SQLite + ChromaDB) : capture automatique via hooks. Historique de sessions, observations, découvertes, corrections de bugs. Recherche sémantique.", "Règle de non-duplication : ne jamais stocker le même fait dans deux briques. Si c'est dans MEMORY.md, ne pas répliquer dans SQLite. Si c'est capturé par claude-mem, ne pas l'écrire manuellement."] },
        { title: "Table de routage : quoi va où", concept: ["→ Stack, ports, URLs, credentials du projet → fichiers curatés (MEMORY.md → stack.md, credentials.md)", "→ Règles comportementales actives → CLAUDE.md (court, < 200 lignes)", "→ Préférence de style atomique → SQLite (cc-mem add pref <key> <valeur>)", "→ Décision architecturale avec date → SQLite (cc-mem add decision <key> <valeur>)", "→ 'Qu'avons-nous fait la dernière fois sur X ?' → claude-mem timeline", "→ 'Avons-nous déjà vu ce bug ?' → claude-mem search <symptôme>", "→ Historique de session, découvertes → automatique (claude-mem via hooks — ne rien faire)", "→ Credentials et tokens → fichiers curatés UNIQUEMENT (jamais dans claude-mem ni SQLite)"], commandes: ["# Tableau de routage à ajouter dans CLAUDE.md :\ncat >> ~/.claude/CLAUDE.md <<'EOF'\n\n## Coordination mémoire — Table de routage\n| Besoin | Brique | Action |\n|---|---|---|\n| Stack, ports, URLs projet | Fichiers curatés | Lire MEMORY.md → fichier lié |\n| Règle comportementale | CLAUDE.md | Courte, concrète |\n| Préférence de style | SQLite | cc-mem get <mot> |\n| Décision datée | SQLite | cc-mem get <projet> |\n| 'Que s'est-il passé la dernière fois ?' | claude-mem | claude-mem timeline |\n| Bug déjà rencontré | claude-mem | claude-mem search <symptôme> |\n| Credentials/tokens | Fichiers curatés | Jamais ailleurs |\nEOF"], verify: ["grep -A8 'Table de routage' ~/.claude/CLAUDE.md"] },
        { title: "Directives Claude : quand lire la mémoire", concept: ["Claude doit vérifier la mémoire AVANT de faire des hypothèses sur les préférences ou décisions passées.", "Ordre de lecture : (1) CLAUDE.md chargé au démarrage. (2) @MEMORY.md si référencé. (3) cc-mem get <mot> si une préférence semble manquer. (4) claude-mem search pour l'historique.", "Ne jamais consulter toutes les briques à chaque réponse — seulement quand une information semble pertinente et absente du contexte actuel.", "Signal pour consulter : phrase comme 'habituellement', 'comme avant', 'quelle est ta préférence', 'avons-nous déjà fait ça'."], commandes: ["cat >> ~/.claude/CLAUDE.md <<'EOF'\n\n## Directives lecture mémoire\nAvant de formuler une hypothèse sur une préférence ou décision passée :\n1. Vérifier le contexte chargé (CLAUDE.md + @MEMORY.md)\n2. Si absent : cc-mem get <mot-clé>\n3. Si historique demandé : claude-mem search <terme> ou claude-mem timeline\nNe pas interroger toutes les briques systématiquement — seulement si manque détecté.\nEOF"], verify: ["grep -n 'Directives lecture' ~/.claude/CLAUDE.md"] },
        { title: "Directives Claude : quand écrire en mémoire", concept: ["Claude écrit en mémoire sur demande explicite ('retiens que', 'note ça', 'remember') ou quand il détecte une correction de comportement (feedback).", "Mémoire curatée (fichiers) : user preferences, feedback corrections, architecture projet. Écrite avec Write/Edit — visible et auditable.", "SQLite : faits atomiques stables. Écrit avec cc-mem add — rapide, interrogeable.", "claude-mem : capturé automatiquement via hooks. Claude ne l'écrit jamais manuellement.", "Ne jamais dupliquer : si une info est déjà dans MEMORY.md, ne pas la réécrire dans SQLite."], commandes: ["# La capture claude-mem est automatique (hooks).\n# Pour écrire en SQLite manuellement :\n~/.claude/cc-mem add pref ui-style 'dark-first, glassmorphism'\n~/.claude/cc-mem add decision auth 'Supabase Auth — 2026-04'\n\n# Pour vérifier ce qui a été capturé :\n~/.claude/cc-mem list"], verify: ["~/.claude/cc-mem list | head -10"] }
      ]},
      { id: "plugins", icon: "extension", short: "Plugins & Skills", title: "Plugins & Skills", desc: "Active les 7 plugins Claude Code via settings.json : superpowers, codex (marketplace GitHub custom), code-review, security-guidance, skill-creator, frontend-design, telegram.", purpose: ["Les plugins activent l'écosystème Claude Code : superpowers (skills, advisor, speckit), Codex stop-gate (review automatique avant fin de session), security-guidance (alerte avant Edit/Write risqué sur du code sensible), telegram (accès distant), code-review, frontend-design, skill-creator. Sans eux, Claude Code reste un CLI basique.", "**Le gain** : un Claude Code augmenté — review automatique en fin de session, alertes sécurité sur du code dangereux, skills réutilisables (TDD, debugging, finishing-branch), accès mobile via Telegram, marketplace de skills. C'est la différence entre 'CLI nu' et 'environnement de travail complet'."], steps: [
        { title: "Activer les plugins dans settings.json", concept: ["Les plugins Claude Code s'activent via enabledPlugins dans ~/.claude/settings.json.", "Au premier lancement suivant, Claude Code les télécharge et installe automatiquement.", "Les 7 plugins : superpowers (skills, advisor, speckit), codex, code-review, security-guidance, skill-creator, frontend-design, telegram.", "⚠️ Les commandes ci-dessous fusionnent les clés dans settings.json existant — elles ne l'écrasent pas."], commandes: ["# Créer settings.json s'il n'existe pas encore\nmkdir -p ~/.claude\n[ ! -f ~/.claude/settings.json ] && echo '{}' > ~/.claude/settings.json\n\n# Fusionner les paramètres de base (préserve permissions, hooks, etc.)\nS=~/.claude/settings.json\njq '. * {\"model\":\"sonnet\",\"language\":\"français\",\"effortLevel\":\"high\",\"advisorModel\":\"opus\",\"autoDreamEnabled\":true,\"skipDangerousModePermissionPrompt\":true,\"voiceEnabled\":true}' \"$S\" > /tmp/cc.json && mv /tmp/cc.json \"$S\"\n\n# Fusionner les plugins (préserve les plugins existants)\njq '.enabledPlugins = ((.enabledPlugins // {}) * {\"superpowers@claude-plugins-official\":true,\"codex@openai-codex\":true,\"code-review@claude-plugins-official\":true,\"security-guidance@claude-plugins-official\":true,\"skill-creator@claude-plugins-official\":true,\"frontend-design@claude-plugins-official\":true,\"telegram@claude-plugins-official\":true})' \"$S\" > /tmp/cc.json && mv /tmp/cc.json \"$S\""], verify: ["jq '.enabledPlugins | keys' ~/.claude/settings.json"] },
        { title: "Ajouter le marketplace Codex", concept: ["Le plugin codex vient du marketplace GitHub openai/codex-plugin-cc, pas du marketplace officiel Anthropic.", "La clé extraKnownMarketplaces déclare cette source externe — sans elle, codex@openai-codex est introuvable.", "Ce marketplace expose le plugin Codex CLI intégré à Claude Code."], commandes: ["# Ajouter uniquement la clé openai-codex (préserve les autres marketplaces éventuels)\njq '.extraKnownMarketplaces.\"openai-codex\" = {\"source\":{\"source\":\"github\",\"repo\":\"openai/codex-plugin-cc\"}}' ~/.claude/settings.json > /tmp/s.json && mv /tmp/s.json ~/.claude/settings.json"], verify: ["jq '.extraKnownMarketplaces' ~/.claude/settings.json"] },
        { title: "Premier lancement — installation des plugins", concept: ["Au premier claude, tous les plugins déclarés s'installent dans ~/.claude/plugins/cache/.", "L'installation prend 1-2 min. Quitter avec /exit une fois terminé.", "Les plugins injectent automatiquement des hooks : Codex stop-gate (revue à chaque fin de session), security-guidance (alerte avant Edit/Write risqué), superpowers SessionStart (chargement mémoire)."], commandes: ["claude"], verify: ["ls ~/.claude/plugins/cache/ 2>/dev/null | head -10"] },
        { title: "Vérifier les hooks auto-injectés", concept: ["3 hooks sont actifs automatiquement après installation des plugins (zéro config manuelle) :", "• Codex stop-gate (Stop event, 900s) : Codex passe en revue les fichiers modifiés avant de clore la session.", "• security-guidance (PreToolUse Edit/Write) : avertit si le code contient une vulnérabilité potentielle.", "• superpowers SessionStart : charge les fichiers mémoire du projet au démarrage."], commandes: ["ls ~/.claude/plugins/cache/ | head -20"], verify: ["ls ~/.claude/plugins/cache/claude-plugins-official/superpowers/"] }
      ]},
      { id: "hooks-python", icon: "webhook", short: "Hooks Python", title: "Hooks Python — framework dispatcher", desc: "Framework Python centralisé pour les events Claude Code (PreCompact, PostCompact, TaskCompleted, SubagentStop, WorktreeCreate/Remove, …). Un dispatcher unique, des handlers chargés dynamiquement, logs JSONL append-only, snapshots de session avant compaction.", purpose: ["Claude Code expose 27 hook events. Sans framework, chaque event = un script shell ad-hoc dans settings.json — chacun parsant le JSON, gérant ses logs, ses erreurs. Au-delà de 3-4 hooks, c'est ingérable et duplicable.", "**Le gain** : UN dispatcher Python centralisé, handlers chargés dynamiquement (drop un .py et c'est actif), logs JSONL append-only pour audit, snapshots avant chaque /compact (rattrapage possible si une session est compactée trop tôt). Tu peux ajouter un nouvel handler en 10 lignes au lieu de 100."], steps: [
        { title: "Concept : pourquoi un dispatcher Python", concept: ["Claude Code expose 27 hook events (PreToolUse, Stop, PreCompact, PostCompact, TaskCompleted, SubagentStart/Stop, WorktreeCreate/Remove, Notification, etc.).", "Sans framework : N scripts shell éparpillés dans settings.json, chacun avec son propre parsing JSON et ses propres logs. Vite ingérable.", "Avec dispatcher : UN seul script Python, déclaration des handlers via JSON config, logs JSONL append-only, exception → log + continue (jamais bloquer le runtime).", "Convention handler : un fichier Python ~/.claude/hooks/py/handlers/<name>.py expose `handle(payload: dict) -> dict | None`. Charge dynamique, hot-pluggable.", "Compatibilité avec d'autres hooks : ce framework s'ajoute aux hooks existants (RTK rewrite sur PreToolUse, hooks plugin Codex/security-guidance auto-injectés). Aucun conflit."]},
        { title: "Créer le dispatcher principal", concept: ["~/.claude/hooks/py/dispatcher.py est invoqué pour chaque event déclaré dans settings.json.", "Il lit le payload JSON sur stdin, charge handlers.json (+ handlers.local.json optionnel), exécute les handlers déclarés pour l'event, et écrit éventuellement une décision sur stdout (PreToolUse/Stop uniquement).", "Best-effort : exception dans un handler → log + continue, jamais bloquer le runtime de Claude Code."], commandes: ["mkdir -p ~/.claude/hooks/py/handlers ~/.claude/hooks/config ~/.claude/hooks/logs\n# Copier le contenu de src-hooks-dispatcher ci-dessous dans :\n#   ~/.claude/hooks/py/dispatcher.py\nchmod +x ~/.claude/hooks/py/dispatcher.py"], verify: ["python3 ~/.claude/hooks/py/dispatcher.py --event=Test < /dev/null && echo '✓ dispatcher OK'"], src: "src-hooks-dispatcher" },
        { title: "Créer les handlers de base", concept: ["Trois handlers utiles dès l'installation, à placer dans ~/.claude/hooks/py/handlers/ :", "• log_event.py : append JSONL dans logs/<event>.jsonl. Audit + retroinspection des events.", "• snapshot_session.py : sur PreCompact, sauvegarde transcript_path + cwd + ts + session_id dans logs/snapshots/, et copie le transcript jsonl. Permet de retrouver le contexte d'une session compactée.", "• notify_subagent.py : sur SubagentStop, bell terminal + nom du subagent → discret en parallélisation."], commandes: ["# Copier le contenu de src-hooks-handlers ci-dessous, qui contient 3 fichiers concaténés.\n# Chaque section est délimitée par '### FILE: handlers/<name>.py' — copier chaque section dans son fichier."], verify: ["ls ~/.claude/hooks/py/handlers/ && [ $(ls ~/.claude/hooks/py/handlers/*.py 2>/dev/null | wc -l) -ge 3 ] && echo '✓ 3 handlers en place'"], src: "src-hooks-handlers" },
        { title: "Configurer handlers.json + déclarer dans settings.json", concept: ["handlers.json mappe chaque event aux handlers à exécuter, dans l'ordre.", "settings.json déclare le dispatcher pour chaque event via le bloc hooks. Timeout court (3000ms), async true.", "Le merge jq est idempotent : si tu re-runs, il remplace au lieu de dupliquer."], commandes: ["# 1. Config des handlers par event :\ncat > ~/.claude/hooks/config/handlers.json <<'EOF'\n{\n  \"PreCompact\":      [{\"name\":\"log_event\"}, {\"name\":\"snapshot_session\"}],\n  \"PostCompact\":     [{\"name\":\"log_event\"}],\n  \"TaskCompleted\":   [{\"name\":\"log_event\"}],\n  \"SubagentStop\":    [{\"name\":\"notify_subagent\"}, {\"name\":\"log_event\"}],\n  \"WorktreeCreate\":  [{\"name\":\"log_event\"}],\n  \"WorktreeRemove\":  [{\"name\":\"log_event\"}]\n}\nEOF\n\n# 2. Déclarer chaque event dans settings.json (idempotent) :\nS=~/.claude/settings.json\n[ ! -f \"$S\" ] && echo '{}' > \"$S\"\nfor EVT in PreCompact PostCompact TaskCompleted SubagentStop WorktreeCreate WorktreeRemove; do\n  CMD=\"/usr/bin/python3 $HOME/.claude/hooks/py/dispatcher.py --event=$EVT\"\n  jq --arg evt \"$EVT\" --arg cmd \"$CMD\" '\n    .hooks[$evt] = (((.hooks[$evt] // []) | map(select((.hooks // [{}])[0].command != $cmd))) + [{\"hooks\":[{\"type\":\"command\",\"command\":$cmd,\"timeout\":3000,\"async\":true}]}])\n  ' \"$S\" > /tmp/cc.json && mv /tmp/cc.json \"$S\"\ndone"], verify: ["jq '.hooks | keys' ~/.claude/settings.json && cat ~/.claude/hooks/config/handlers.json | jq 'keys'"] }
      ]},
      { id: "workflow", icon: "rocket_launch", short: "Workflow de dév.", title: "Workflow de développement", desc: "Cycle TDD avec speckit (remplace brainstorming/writing-plans), agents dédiés isolés en worktree, 8 quality gates avec règles conditionnelles, /speckit-flow pour orchestrer Research→Plan→Implement→Gates en une commande.", purpose: ["Sans discipline, Claude génère du code qui marche mais n'est pas testé, mal architecturé, et impossible à reviewer en équipe. C'est le piège classique 'ça marche sur ma machine puis ça casse en prod'.", "**Le gain** : speckit + agents dédiés + 8 quality gates transforment Claude Code en méthode reproductible. TDD strict (tests AVANT code), isolation des phases (research / plan / impl chacun dans son contexte), validation par /codex:review (deuxième paire d'yeux Opus). C'est la différence entre 'générateur de code' et 'ingénieur méthodique'."], steps: [
        { title: "Vérifier superpowers + speckit installés", concept: ["superpowers est le plugin qui charge les skills à chaque session (SessionStart hook automatique).", "Installé via le module Plugins (settings.json enabledPlugins).", "speckit est un skill EMBARQUÉ dans superpowers. Il doit apparaître dans le cache.", "Si absent, c'est que les plugins n'ont pas été installés — refais le module Plugins puis relance claude."], commandes: ["# Vérifier la présence du skill speckit :\nls ~/.claude/plugins/cache/claude-plugins-official/superpowers/skills/ | grep -i speckit\n\n# Si vide, forcer la réinstallation :\nclaude --version"], verify: ["ls ~/.claude/plugins/cache/claude-plugins-official/superpowers/skills/ 2>/dev/null | grep -qi speckit && echo '✓ speckit OK' || echo '✗ speckit manquant — refaire module Plugins'"] },
        { title: "settings.json — Skill Priority + plansDirectory + agent teams", concept: ["3 réglages liés au workflow speckit :", "• Skill Priority dans CLAUDE.md : dit à Claude d'utiliser superpowers-speckit pour tout nouveau dev (au lieu de brainstorming/writing-plans).", "• plansDirectory: './reports' : sauvegarde les plans speckit dans ./reports/ du projet — au lieu d'être éphémères en contexte. Tu peux relire le plan, le partager, y revenir entre sessions.", "• CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 : flag expérimental qui permet à plusieurs subagents de coopérer sur une même tâche avec coordination via state partagé."], commandes: ["# 1. Ajouter plansDirectory et le flag agent teams dans settings.json global :\nS=~/.claude/settings.json\n[ ! -f \"$S\" ] && echo '{}' > \"$S\"\njq '. * {\"plansDirectory\":\"./reports\"} | .env = ((.env // {}) * {\"CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS\":\"1\"})' \"$S\" > /tmp/cc.json && mv /tmp/cc.json \"$S\"\n\n# 2. Ajouter Skill Priority dans CLAUDE.md global (idempotent) :\nC=~/.claude/CLAUDE.md\n[ ! -f \"$C\" ] && touch \"$C\"\ngrep -q 'Skill Priority' \"$C\" || cat >> \"$C\" <<'EOF'\n\n## Skill Priority\n- Pour tout nouveau dev (feature, projet, composant) : utiliser le skill superpowers-speckit (specify→clarify→plan→tasks→analyze→implement) au lieu de brainstorming/writing-plans.\n- Pour les features non-triviales (>1 fichier ou >30 min) : préférer /speckit-flow à l'invocation manuelle du skill speckit.\n- Les autres skills superpowers restent actifs (TDD, debugging, worktrees, code-review, finishing-branch, verification).\nEOF"], verify: ["jq '.plansDirectory, .env.CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS' ~/.claude/settings.json && grep -q 'Skill Priority' ~/.claude/CLAUDE.md && echo '✓ OK'"] },
        { title: "Agent dédié — speckit-impl (Opus, worktree, TDD)", concept: ["speckit-impl est un subagent Opus qui exécute la phase implement de speckit en isolation totale.", "Configuration : isolation worktree (git worktree dédié), permissionMode acceptEdits, skills préchargés (speckit, TDD, verification, refactoring), memory: project.", "Discipline TDD stricte : un test échoué = délégation à test-validator pour diagnostic.", "Avantage clé : le contexte parent reste propre — l'implémentation se passe dans un sous-contexte avec ses propres tools."], commandes: ["mkdir -p ~/.claude/agents\n# Copier le contenu de src-speckit-impl ci-dessous dans :\n#   ~/.claude/agents/speckit-impl.md\n# (le bouton Copier est en bas de cette section)"], verify: ["test -f ~/.claude/agents/speckit-impl.md && head -1 ~/.claude/agents/speckit-impl.md && echo '✓ agent en place'"], src: "src-speckit-impl" },
        { title: "Agent dédié — test-validator (Sonnet, read-only)", concept: ["test-validator est un subagent Sonnet read-only sur le code applicatif.", "Deux modes : validation (lance les tests, rapport ✅/❌) et diagnostic (root-cause analysis sur un échec).", "Skills préchargés : systematic-debugging, verification-before-completion. Pas d'edit — il rapporte uniquement.", "speckit-impl le délègue dès qu'un test échoue : la diagnose se fait dans un contexte isolé pour ne pas polluer l'implémentation."], commandes: ["mkdir -p ~/.claude/agents\n# Copier le contenu de src-test-validator ci-dessous dans :\n#   ~/.claude/agents/test-validator.md"], verify: ["test -f ~/.claude/agents/test-validator.md && echo '✓ agent en place'"], src: "src-test-validator" },
        { title: "Slash command /speckit-flow", concept: ["/speckit-flow orchestre le workflow complet en une commande : Research (Explore/Haiku read-only) → Spec & Plan (skill speckit, sauvegarde dans ./reports/) → Implement (speckit-impl/Opus en worktree) → Quality gates automatiques.", "Pattern Command → Agent → Skill : la commande oriente, les agents exécutent en isolation, les gates valident.", "À utiliser pour features non-triviales (>1 fichier ou >30 min). Pour les petits ajouts, le skill speckit direct suffit.", "Avantage clé : isolation des phases — chaque agent a son propre contexte, le principal reste propre."], commandes: ["mkdir -p ~/.claude/commands\n# Copier le contenu de src-speckit-flow ci-dessous dans :\n#   ~/.claude/commands/speckit-flow.md"], verify: ["test -f ~/.claude/commands/speckit-flow.md && echo '✓ /speckit-flow disponible'"], src: "src-speckit-flow" },
        { title: "Les 8 quality gates (avec règles conditionnelles)", concept: ["Avant tout commit / PR, dans cet ordre strict :", "1. /verification (skill verification-before-completion) — tests, build, lint, build clean", "2. /simplify — éliminer abstractions inutiles, YAGNI, suppressions safe", "3. self-review — relecture du diff complet par Claude (auto-critique)", "4. /security-review — CONDITIONNEL : seulement si auth, crypto, secrets, payment, upload, permissions ou SQL touchés", "5. /codex:review — revue indépendante par Codex (deuxième paire d'yeux Opus, modèle différent)", "6. receiving-code-review — appliquer les retours du review précédent", "7. /code-review — CONDITIONNEL : seulement si PR créée et diff > 50 lignes", "8. /finishing-branch — polish final, cohérence, doc minimale, prêt à merger", "Hygiene commit : aucun 'Co-Authored-By: Claude' ni 'Generated with Claude Code' dans commits/PR. L'utilisateur est l'unique auteur."], commandes: ["C=~/.claude/CLAUDE.md\n[ ! -f \"$C\" ] && touch \"$C\"\ngrep -q 'Quality Gates' \"$C\" || cat >> \"$C\" <<'EOF'\n\n## Quality Gates (ordre strict avant commit/PR)\n1. /verification — tests, build, lint\n2. /simplify — YAGNI, suppressions safe\n3. self-review — relecture diff complet\n4. /security-review — si auth/crypto/secrets/payment/upload/permissions/SQL\n5. /codex:review — review indépendant Codex\n6. receiving-code-review — appliquer retours\n7. /code-review — si PR créée et diff > 50 lignes\n8. /finishing-branch — polish final\n\n## Commit hygiene\n- Aucun 'Co-Authored-By: Claude' ni 'Generated with Claude Code' dans commits ou PR.\n- L'utilisateur est l'unique auteur.\nEOF"], verify: ["grep -A6 'Quality Gates' ~/.claude/CLAUDE.md"] }
      ]},
      { id: "worktrees", icon: "account_tree", short: "Worktrees parallèles", title: "Worktrees parallèles", desc: "3-5 sessions Claude Code en parallèle, chacune dans un worktree git isolé — appelé par Boris Cherny le 'biggest productivity unlock' de Claude Code. Aliases shell pour créer/naviguer/lancer Claude dans un worktree en une commande.", purpose: ["Une seule session Claude active = un seul scope, /compact toutes les heures, attention divisée entre les features en cours. Tu pivotes mal, tu perds le fil, tu fais du mauvais boulot sur les deux fronts.", "**Le gain** : 3-5 worktrees parallèles, chacun avec un scope réduit = pas de /compact nécessaire, productivité multipliée. `f new-feature` et tu as une nouvelle session Claude prête en 5 secondes. Combiné avec `isolation: worktree` sur les subagents (ex: speckit-impl), tu obtiens un parallélisme à 2 niveaux : entre tes sessions humaines + au sein d'une session via subagents."], steps: [
        { title: "Concept : pourquoi 3-5 worktrees parallèles", concept: ["Boris Cherny (créateur de Claude Code) appelle ce pattern le 'biggest productivity unlock' : plusieurs sessions Claude actives, chacune dans un worktree git distinct, avec un scope réduit.", "Avantages :", "• Pas de /compact à gérer : chaque session reste propre car son scope est limité.", "• Travail parallèle réel : feature A en worktree 1, refactor B en worktree 2, exploration C en worktree 3.", "• Contexte d'attention humain préservé : tu pivotes entre sessions sans perdre le fil.", "Combiné avec les subagents (frontmatter `isolation: worktree`, ex: speckit-impl), tu obtiens un parallélisme à 2 niveaux : entre sessions humaines + au sein d'une session via subagents.", "Limite pratique : 3-5 max — au-delà, la coordination humaine devient le goulot. UN worktree = UNE branche = UN sujet."]},
        { title: "Installer les aliases shell", concept: ["5 fonctions + 2 aliases dans un fichier sourcé depuis ~/.zshrc :", "• cwt <branch> : naviguer dans un worktree existant", "• cwt-new <branch> [base] : créer un nouveau worktree (depuis main par défaut) et y entrer", "• cwt-ls : lister les worktrees du repo courant", "• cwt-rm <branch> [--with-branch] : supprimer un worktree (et optionnellement la branche)", "• m / f / a : raccourcis Boris-style — m = main + claude (depuis le repo principal), f <branch> = feature worktree + claude, a = analysis worktree (read-only) + claude", "Convention : worktrees stockés dans ~/Dev/_worktrees/<repo>-<branch>.", "⚠️ Collision potentielle : les noms 1-lettre m / f / a peuvent entrer en conflit avec d'autres outils (fzf wrappers, alias man, complétions). Vérifier AVANT de sourcer avec `type m f a` — si déjà définis, renommer en cc-m / cc-f / cc-a dans aliases-worktrees.sh."], commandes: ["# 1. Vérifier les collisions potentielles :\ntype m f a 2>&1 | grep -v 'not found' && echo '⚠️ Conflit détecté — éditer src-aliases-worktrees pour renommer m/f/a en cc-m/cc-f/cc-a' || echo '✓ Pas de conflit, on peut continuer'\n\n# 2. Copier le contenu de src-aliases-worktrees ci-dessous dans :\n#   ~/.claude/aliases-worktrees.sh\n\n# 3. Sourcer depuis ~/.zshrc (idempotent) :\nZRC=~/.zshrc\n[ ! -f \"$ZRC\" ] && touch \"$ZRC\"\ngrep -q 'aliases-worktrees.sh' \"$ZRC\" || \\\n  printf '\\n[ -f \"$HOME/.claude/aliases-worktrees.sh\" ] && source \"$HOME/.claude/aliases-worktrees.sh\"\\n' >> \"$ZRC\"\n\n# 4. Recharger pour cette session :\nsource ~/.claude/aliases-worktrees.sh"], verify: ["type cwt cwt-new >/dev/null 2>&1 && echo '✓ aliases cwt en place' && (type f >/dev/null 2>&1 && type a >/dev/null 2>&1 && echo '✓ raccourcis Boris en place' || echo '⚠️ raccourcis m/f/a non installés ou écrasés — ouvrir aliases-worktrees.sh pour renommer')"], src: "src-aliases-worktrees" },
        { title: "Workflow type — créer un worktree + lancer Claude", concept: ["Cas d'usage 1 — feature parallèle : tu es sur main avec une session Claude. Une autre feature urgente arrive. Dans un nouveau terminal : `f new-feature` → crée le worktree + lance Claude dedans. Tu as 2 sessions Claude isolées, pas de /compact dans la première.", "Cas d'usage 2 — exploration read-only : `a` (analysis) → ouvre un worktree dédié à l'exploration sans toucher au code actif. Utile pour audits, RGPD, sécurité.", "Cas d'usage 3 — agent isolé en worktree : speckit-impl (cf. module Workflow) a `isolation: worktree` dans son frontmatter. Quand tu invoques `Agent({subagent_type:\"speckit-impl\",...})`, un worktree est créé automatiquement pour cet agent — tu n'as rien à faire."], commandes: ["# Test du flow complet (depuis un repo git, branche main propre) :\ncwt-ls                              # liste actuelle\nf test-worktrees                    # crée + lance Claude dans ~/Dev/_worktrees/<repo>-test-worktrees\n# Dans Claude : faire qq chose, commit, /exit\ncwt-rm test-worktrees --with-branch # nettoyage (worktree + branche)"], verify: ["cwt-ls"] }
      ]},
      { id: "multiagents", icon: "diversity_3", short: "Multi-agents", title: "Multi-agents", desc: "⚠️ Utile uniquement si vous avez plusieurs abonnements actifs (Anthropic + OpenAI et/ou Google). Coordonne Claude (orchestration), Codex (implémentation) et Gemini (gratuit, git/docs) via tmux.", purpose: ["Si tu as plusieurs abonnements (Anthropic + ChatGPT Pro + Gemini), tu peux orchestrer Claude (architecture/review) + Codex (implémentation, SOTA SWE-bench) + Gemini (git/docs/contexte large 1M tokens) sur la même tâche, en parallèle, sans conflit d'écriture grâce au filesystem comme bus de communication.", "**Le gain** : utiliser le meilleur modèle pour chaque sous-tâche au lieu de tout faire avec un seul, et travailler en parallèle au lieu de séquentiellement. ⚠️ Inutile si tu n'as qu'un seul abonnement — reste en solo, ce module ne s'applique pas."], steps: [
        { title: "Prérequis : abonnements nécessaires", concept: ["⚠️ Le multi-agent n'apporte de la valeur que si vous avez plusieurs abonnements CLI actifs. Avec un seul compte Claude, restez en solo.", "Claude (Anthropic) : orchestrateur et architecte. Abonnement Pro (~20$/mo) ou Max (~100-200$/mo). CLI : claude.", "Codex (OpenAI) : développeur senior, le meilleur générateur de code (SWE-bench Pro SOTA). Inclus dans ChatGPT Pro. CLI : codex. Utiliser pour les implémentations features ciblées.", "Gemini (Google) : gratuit (60 req/min, 1000/jour). Rôle : git/GitHub (branches, commits, PRs), documentation, analyse de contexte large (1M tokens), modules secondaires. CLI : gemini.", "Architecture : Claude orchestre via le filesystem (.ai/state.json, .ai/context/, .ai/tasks/). Un fichier = un agent max pour éviter les conflits d'écriture.", "Matrice de décision : tâche d'implémentation complexe → Codex. Git/PR/docs → Gemini. Architecture/review/réconciliation → Claude."], commandes: ["# Installer les CLIs selon vos abonnements :\nnpm install -g @anthropic-ai/claude-code        # Claude (toujours)\nnpm install -g @openai/codex                    # Codex (si ChatGPT Pro)\n# Gemini : https://ai.google.dev/gemini-api/docs/gemini-cli\n\n# Vérifier :\ncommand -v claude && echo '✓ claude'\ncommand -v codex && echo '✓ codex'\ncommand -v gemini && echo '✓ gemini'"], verify: ["command -v claude && command -v tmux"] },
        { title: "Installer tmux-ai", concept: ["tmux-ai cree des sessions reproductibles: solo, duo, team, monitor et review.", "Layouts : solo (Claude + shell), duo (Claude + Gemini), team (Claude + Codex + Gemini + shell), monitor (Claude + tests + logs + git).", "Le flag -k supprime la session existante avant de la recreer."], commandes: ["mkdir -p ~/bin", "pbpaste > ~/bin/tmux-ai", "chmod +x ~/bin/tmux-ai"], verify: ["~/bin/tmux-ai --help"], src: "src-tmux-ai" },

    function applyState() {

      if (memoryHead) memoryHead.textContent = memoryCountText();
      MODULES.forEach(function (mod) {
        const panel = document.getElementById("module-" + mod.id);
        if (panel) panel.querySelector(".meter-num").textContent = countText(mod);
      });
      const completed = MODULES.filter(function (m) { return countDone(m) === m.steps.length; }).length;
      document.querySelector(".progress-fill").style.width = ((completed / MODULES.length) * 100) + "%";
      document.querySelector(".progress-label").textContent = completed + " / " + MODULES.length + " modules";
    }
    function openModule(id) {
      currentModule = id;
      localStorage.setItem("ccsg_open_module", id);
      document.querySelectorAll(".module-panel").forEach(function (p) { p.classList.toggle("active", p.id === "module-" + id); });
      updateCounts();
      document.getElementById("content").scrollTop = 0;
    }
    function toggleStep(header) {
      const step = header.closest(".step");
      if (step.classList.contains("locked")) return;
      if (step.classList.contains("done")) step.classList.toggle("expanded");
      else step.classList.toggle("expanded");
    }
    function handleCheck(event, checkbox) {
      event.stopPropagation();
      const step = checkbox.closest(".step");
      const moduleId = step.getAttribute("data-module");
      const index = Number(step.getAttribute("data-index"));
      const mod = MODULES.find(function (m) { return m.id === moduleId; });
      if (!progress[moduleId]) progress[moduleId] = {};
      if (progress[moduleId][index]) {
        for (let i = index; i <= mod.steps.length; i += 1) delete progress[moduleId][i];
      } else {
        progress[moduleId][index] = true;
        if (index === mod.steps.length) confetti();
      }
      saveProgress();
      applyState();
    }
    function switchTabBtn(btn) {
      const body = btn.closest(".step-body");
      const step = btn.closest(".step");
      const key = step.getAttribute("data-module") + "-" + step.getAttribute("data-index");
      const tab = btn.getAttribute("data-tab");
      openTabs[key] = tab;
      saveTabs();
      body.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.toggle("active", b === btn); });
      body.querySelectorAll(".tab-pane").forEach(function (p) { p.classList.toggle("visible", p.getAttribute("data-tab") === tab); });
    }
    function applyTab(step, key) {
      const selected = openTabs[key] || "concept";
      step.querySelectorAll(".tab-btn").forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-tab") === selected); });
      step.querySelectorAll(".tab-pane").forEach(function (p) { p.classList.toggle("visible", p.getAttribute("data-tab") === selected); });
    }
    function loadCodeSources() {
      document.querySelectorAll("pre[data-src]").forEach(function (pre) {
        const src = document.getElementById(pre.getAttribute("data-src"));
        if (src) pre.textContent = src.textContent.trim();
      });
    }
    function copyCode(btn) {
      const text = btn.parentElement.querySelector("pre").textContent;
      navigator.clipboard.writeText(text).then(function () { flash(btn, "Copié"); });
    }
    function copyPrompt(btn) {
      const text = btn.parentElement.querySelector("pre").textContent;
      navigator.clipboard.writeText(text).then(function () { flash(btn, "Prompt copié"); });
    }
    function flash(btn, label) {
      const old = btn.textContent;
      btn.textContent = label;
      setTimeout(function () { btn.textContent = old; }, 1100);
    }
    function togglePrompt(moduleId) {
      document.getElementById("prompt-" + moduleId).classList.toggle("open");
      loadCodeSources();
    }
    function setTheme(theme) {
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem("ccsg_theme", theme);
      document.querySelectorAll(".theme-btn").forEach(function (b) { b.classList.toggle("active", b.getAttribute("data-theme-choice") === theme); });
    }
    function confetti() {
      const canvas = document.getElementById("confetti");
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const css = getComputedStyle(document.body);
      const colors = [css.getPropertyValue("--accent").trim(), css.getPropertyValue("--accent2").trim(), css.getPropertyValue("--success").trim(), "#f59e0b", "#ef4444"];
      const parts = [];
      for (let i = 0; i < 150; i += 1) parts.push({ x: Math.random() * canvas.width, y: -20 - Math.random() * 120, w: 5 + Math.random() * 9, h: 8 + Math.random() * 14, vy: 2 + Math.random() * 5, vx: -2 + Math.random() * 4, r: Math.random() * 6.28, vr: -.2 + Math.random() * .4, c: colors[i % colors.length] });
      const start = performance.now();
      function frame(now) {
        const t = Math.min(1, (now - start) / 1500);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1 - t;
        parts.forEach(function (p) {
          p.x += p.vx; p.y += p.vy; p.r += p.vr;
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.r); ctx.fillStyle = p.c; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
        });
        if (t < 1) requestAnimationFrame(frame); else ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      requestAnimationFrame(frame);
    }
    document.addEventListener("DOMContentLoaded", function () {
      progress = loadJson("ccsg_progress", {});
      openTabs = loadJson("ccsg_open_tabs", {});
      renderSidebar();
      renderModules();
      document.querySelectorAll(".theme-btn").forEach(function (btn) { btn.addEventListener("click", function () { setTheme(btn.getAttribute("data-theme-choice")); }); });
      setTheme(localStorage.getItem("ccsg_theme") || "system");
      currentModule = localStorage.getItem("ccsg_open_module") || "base";
      applyState();
      openModule(currentModule);
    });
    window.toggleStep = toggleStep;
    window.handleCheck = handleCheck;
    window.switchTabBtn = switchTabBtn;
    window.copyCode = copyCode;
    window.copyPrompt = copyPrompt;
    window.togglePrompt = togglePrompt;
  </script>

  <script type="text/x-code" id="prompt-memory-claudemem-content">

1. Installer claude-mem globalement :
   npm install -g claude-mem

2. Initialiser le stockage :
   mkdir -p ~/.claude/claude-mem

   → crée la base SQLite + l'index ChromaDB (recherche sémantique).

3. Ajouter les alias shell dans ~/.zshrc (idempotent — vérifier absence avant append) :
   ZRC=~/.zshrc
   [ ! -f "$ZRC" ] && touch "$ZRC"
   grep -q 'alias cm-add=' "$ZRC" || cat >> "$ZRC" <<'EOF'

# claude-mem aliases
alias cm-add='claude-mem add'
alias cm-find='claude-mem search'
alias cm-list='claude-mem list'
alias cm-time='claude-mem timeline'
EOF

4. Activer la capture automatique via les hooks Claude Code (SessionStart + Stop + UserPromptSubmit). Deux scénarios :

   SCÉNARIO A — claude-mem fournit son propre installateur :
     claude-mem hooks install     # si la commande existe (claude-mem >= 2.x)
     → installe automatiquement les hooks dans ~/.claude/settings.json.

   SCÉNARIO B — installation manuelle des hooks (si l'installateur n'existe pas) :
     S=~/.claude/settings.json
     [ ! -f "$S" ] && echo '{}' > "$S"
     for EVT in SessionStart Stop UserPromptSubmit; do
       CMD="claude-mem hook $EVT"
       jq --arg evt "$EVT" --arg cmd "$CMD" '
         .hooks[$evt] = (((.hooks[$evt] // []) | map(select((.hooks // [{}])[0].command != $cmd))) + [{"hooks":[{"type":"command","command":$cmd,"timeout":5000,"async":true}]}])
       ' "$S" > /tmp/cc.json && mv /tmp/cc.json "$S"
     done
   → Vérifier ensuite avec : jq '.hooks | keys' ~/.claude/settings.json

   - Utiliser claude-mem search AVANT toute hypothèse sur une décision passée
   - Utiliser claude-mem timeline pour retrouver l'historique d'une session
   - Ne jamais écrire manuellement dans claude-mem (capture automatique via les hooks SessionStart/Stop)
   - Utiliser claude-mem add uniquement pour des préférences stables explicites
   - Ne JAMAIS stocker de credentials ou tokens dans claude-mem (ils vont dans les fichiers curatés uniquement)

   claude-mem --version
   ls ~/.claude/claude-mem/
   jq '.hooks | to_entries | map(select(.value | tostring | contains("claude-mem"))) | .[].key' ~/.claude/settings.json

  <script type="text/x-code" id="src-rtk-rewrite">
#!/usr/bin/env bash
# rtk-hook-version: 3
# RTK Claude Code hook — rewrites commands to use rtk for token savings.
# Requires: rtk >= 0.23.0, jq

if ! command -v jq &>/dev/null; then
  echo "[rtk] WARNING: jq is not installed. Install: https://jqlang.github.io/jq/download/" >&2
  exit 0
fi

if ! command -v rtk &>/dev/null; then
  echo "[rtk] WARNING: rtk not in PATH. Install: https://github.com/rtk-ai/rtk#installation" >&2
  exit 0
fi

CACHE_DIR=${XDG_CACHE_HOME:-$HOME/.cache}
CACHE_FILE="$CACHE_DIR/rtk-hook-version-ok"
if [ ! -f "$CACHE_FILE" ]; then
  RTK_VERSION_RAW=$(rtk --version 2>/dev/null)
  RTK_VERSION=${RTK_VERSION_RAW#rtk }
  RTK_VERSION=${RTK_VERSION%% *}
  if [ -n "$RTK_VERSION" ]; then
    IFS=. read -r MAJOR MINOR PATCH <<<"$RTK_VERSION"
    if [ "$MAJOR" -eq 0 ] && [ "$MINOR" -lt 23 ]; then
      echo "[rtk] WARNING: rtk $RTK_VERSION too old (need >= 0.23.0). Upgrade: cargo install rtk" >&2
      exit 0
    fi
  fi
  mkdir -p "$CACHE_DIR" 2>/dev/null
  touch "$CACHE_FILE" 2>/dev/null
fi

INPUT=$(cat)
CMD=$(jq -r '.tool_input.command // empty' <<<"$INPUT")

if [ -z "$CMD" ]; then
  exit 0
fi

REWRITTEN=$(rtk rewrite "$CMD" 2>/dev/null)
EXIT_CODE=$?

case $EXIT_CODE in
  0) [ "$CMD" = "$REWRITTEN" ] && exit 0 ;;
  1) exit 0 ;;
  2) exit 0 ;;
  3) ;;
  *) exit 0 ;;
esac

if [ "$EXIT_CODE" -eq 3 ]; then
  jq -c --arg cmd "$REWRITTEN" \
    '.tool_input.command = $cmd | {
      "hookSpecificOutput": {
        "hookEventName": "PreToolUse",
        "updatedInput": .tool_input
      }
    }' <<<"$INPUT"
else
  jq -c --arg cmd "$REWRITTEN" \
    '.tool_input.command = $cmd | {
      "hookSpecificOutput": {
        "hookEventName": "PreToolUse",
        "permissionDecision": "allow",
        "permissionDecisionReason": "RTK auto-rewrite",
        "updatedInput": .tool_input
      }
    }' <<<"$INPUT"
fi
  </script>

  <script type="text/x-code" id="src-comet-debug">
#!/bin/bash
PORT=9222

check_port() {
  curl -s -o /dev/null -w '%{http_code}' "http://localhost:$PORT/json/version" 2>/dev/null
}

if [ "$1" = "--status" ]; then
  if [ "$(check_port)" = "200" ]; then
    echo "Comet debug port $PORT: active"
    exit 0
  else
    echo "Comet debug port $PORT: inactive"
    exit 1
  fi
fi

if [ "$(check_port)" = "200" ]; then
  exit 0
fi

if pgrep -qf "Comet.app/Contents/MacOS/Comet"; then
  osascript -e 'tell application "Comet" to quit' 2>/dev/null
  for i in $(seq 1 10); do
    pgrep -qf "Comet.app/Contents/MacOS/Comet" || break
    sleep 0.5
  done
fi

open -a Comet --args --remote-debugging-port=$PORT

for i in $(seq 1 16); do
  [ "$(check_port)" = "200" ] && break
  sleep 0.5
done

if [ "$(check_port)" = "200" ]; then
  exit 0
else
  echo "Error: Comet debug port $PORT not responding after launch" >&2
  exit 1
fi
  </script>

Usage:

Layouts:

  team     Claude + Codex + Gemini + shell

  -h, --help       Show this help

die() {
  printf 'tmux-ai: %s\n' "$*" >&2
  exit 1
}

need() {
  command -v "$1" >/dev/null 2>&1 || die "missing command: $1"
}

pane_send() {
  local target="$1"
  local command="$2"
  tmux send-keys -t "$target" "$command" C-m
}

new_session() {
  local session="$1"
  tmux new-session -d -s "$session" -c "$ROOT_DIR"
  tmux set-option -t "$session" status on
  tmux set-option -t "$session" status-left " #S "
  tmux set-option -t "$session" remain-on-exit on

prepare_session() {
  local session="$1"
  if tmux has-session -t "$session" 2>/dev/null; then

      tmux kill-session -t "$session"
    else
      tmux attach-session -t "$session"
      exit 0
    fi
  fi

attach_session() {
  local session="$1"
